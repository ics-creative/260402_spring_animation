<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        min-height: auto;
        padding: 0;
        background: var(--surface);
        gap: 0;
      }

      .story-list {
        width: 100%;
      }

      .story {
        min-height: 140vh;
      }

      .story__frame {
        position: sticky;
        top: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .headline {
        margin: 0;
        display: grid;
        justify-items: center;
        gap: 0.05em;
        font-size: clamp(3rem, 11vw, 8rem);
        line-height: 0.88;
        letter-spacing: -0.08em;
        text-wrap: balance;
      }

      .line {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.04em;
      }

      .letter {
        display: inline-block;
        overflow: clip;
        padding-inline-end: 0.08em;
        margin-inline-end: -0.08em;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="story-list">
          <section class="story" data-story>
            <div class="story__frame">
              <p class="headline">
                <span class="line">
                  <span class="letter">S</span>
                  <span class="letter">P</span>
                  <span class="letter">R</span>
                  <span class="letter">I</span>
                  <span class="letter">N</span>
                  <span class="letter">G</span>
                </span>
                <span class="line">
                  <span class="letter">T</span>
                  <span class="letter">Y</span>
                  <span class="letter">P</span>
                  <span class="letter">E</span>
                </span>
              </p>
            </div>
          </section>

          <section class="story" data-story>
            <div class="story__frame">
              <p class="headline">
                <span class="line">
                  <span class="letter">S</span>
                  <span class="letter">N</span>
                  <span class="letter">A</span>
                  <span class="letter">P</span>
                </span>
                <span class="line">
                  <span class="letter">O</span>
                  <span class="letter">P</span>
                  <span class="letter">E</span>
                  <span class="letter">N</span>
                </span>
              </p>
            </div>
          </section>

          <section class="story" data-story>
            <div class="story__frame">
              <p class="headline">
                <span class="line">
                  <span class="letter">C</span>
                  <span class="letter">L</span>
                  <span class="letter">E</span>
                  <span class="letter">A</span>
                  <span class="letter">N</span>
                </span>
                <span class="line">
                  <span class="letter">E</span>
                  <span class="letter">X</span>
                  <span class="letter">I</span>
                  <span class="letter">T</span>
                </span>
              </p>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script type="module">
      const revealDuration = 560;
      const motionDuration = 920;
      const spring = getComputedStyle(document.documentElement).getPropertyValue("--spring-anchor").trim();
      const stories = [...document.querySelectorAll("[data-story]")].map((story) => ({
        element: story,
        letters: [...story.querySelectorAll(".letter")],
        activeAnimations: [],
        played: false,
      }));

      const resetStory = (story) => {
        story.activeAnimations.forEach((animation) => animation.cancel());
        story.activeAnimations = [];
        story.played = false;

        story.letters.forEach((letter) => {
          letter.style.opacity = "0";
          letter.style.translate = "0 1.02em";
          letter.style.scale = "0.84";
          letter.style.rotate = "0deg";
          letter.style.clipPath = "inset(100% -0.08em 0 0)";
        });
      };

      const playStory = (story) => {
        if (story.played) return;
        story.played = true;
        story.activeAnimations = story.letters.flatMap((letter, index) => {
          const delay = index * 44;

          const reveal = letter.animate(
            [
              {
                opacity: 0,
                clipPath: "inset(100% -0.08em 0 0)",
              },
              {
                opacity: 1,
                clipPath: "inset(0 -0.08em 0 0)",
              },
            ],
            {
              duration: revealDuration,
              delay,
              easing: "ease-out",
              fill: "both",
            },
          );

          const motion = letter.animate(
            [
              {
                translate: "0 1.02em",
                scale: "0.84",
                rotate: "0deg",
              },
              {
                translate: "0 -0.12em",
                scale: "1.075",
                rotate: "0deg",
                offset: 0.68,
              },
              {
                translate: "0 0",
                scale: "1",
                rotate: "0deg",
              },
            ],
            {
              duration: motionDuration,
              delay,
              easing: spring,
              fill: "both",
            },
          );

          return [reveal, motion];
        });
      };

      stories.forEach(resetStory);

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            const story = stories.find((item) => item.element === entry.target);
            if (!story) return;

            if (entry.isIntersecting) {
              playStory(story);
            } else if (entry.boundingClientRect.top > window.innerHeight || entry.boundingClientRect.bottom < 0) {
              resetStory(story);
            }
          });
        },
        {
          threshold: 0.45,
        },
      );

      stories.forEach((story) => observer.observe(story.element));
    </script>
  </body>
</html>
