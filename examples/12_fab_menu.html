<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .fab {
        --item-radius: 96px;

        position: relative;
        width: 180px;
        height: 180px;
        border: 0;

        &::details-content {
          content-visibility: visible;
        }

        .fab-main,
        .fab-item {
          position: absolute;
          right: 0;
          bottom: 0;
          border: 1px solid var(--line);
          border-radius: 50%;
          background: var(--surface);
          cursor: pointer;
        }

        .fab-main {
          width: 64px;
          height: 64px;
          display: grid;
          place-items: center;
          list-style: none;
          transition: border-color 0.2s;

          &::-webkit-details-marker {
            display: none;
          }

          &:is(:hover, :focus-visible) {
            border-color: var(--accent);
            outline: none;
          }
        }

        .fab-item {
          --item-angle: 0deg;

          width: 56px;
          height: 56px;
          display: grid;
          place-items: center;
          text-decoration: none;
          color: var(--text);
          opacity: 0;
          scale: 0.2;
          translate: 0 0;
          transition:
            color 0.2s,
            border-color 0.2s,
            opacity 0.2s,
            scale 0.8s var(--spring-bouncy),
            translate 0.8s var(--spring-bouncy);

          &:is(:hover, :focus-visible) {
            border-color: var(--accent);
            color: var(--accent);
            outline: none;
          }
        }

        .fab-item:nth-of-type(2) {
          --item-angle: 45deg;
        }

        .fab-item:nth-of-type(3) {
          --item-angle: 90deg;
        }

        .fab-main-icon {
          position: relative;
          width: 20px;
          height: 20px;
          transition: rotate 1s var(--spring-bouncy);

          &::before,
          &::after {
            content: "";
            position: absolute;
            top: calc(50% - 1px);
            left: 0;
            width: 20px;
            height: 2px;
            background: var(--accent);
          }

          &::after {
            rotate: 90deg;
          }
        }

        &[open] {
          .fab-main-icon {
            rotate: 135deg;
          }

          .fab-item {
            opacity: 1;
            scale: 1;
            translate:
              calc(sin(var(--item-angle)) * var(--item-radius) * -1)
              calc(cos(var(--item-angle)) * var(--item-radius) * -1);
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <details class="fab">
          <summary class="fab-main">
            <span class="fab-main-icon"></span>
          </summary>
          <a class="fab-item" href="#">A</a>
          <a class="fab-item" href="#">B</a>
          <a class="fab-item" href="#">C</a>
        </details>
      </section>
    </main>
  </body>
</html>
