<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        --shift-x: 0px;
        --shift-y: 0px;
        --shift-scale: 1;

        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding-inline: 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        translate: var(--shift-x) var(--shift-y);
        scale: var(--shift-scale);

        &.is-shifting {
          transition:
            translate 1s var(--spring-bouncy),
            scale 1s var(--spring-bouncy);
        }

        button {
          position: relative;
          width: 24px;
          height: 24px;
          padding: 0;
          border: 0;
          border-radius: 10px;
          background: transparent;
          cursor: pointer;
          transition: all 0.2s;

          &:hover {
            transform: none;
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 12%, transparent);
          }

          &::before,
          &::after {
            content: "";
            position: absolute;
            top: calc(50% - 1px);
            left: 5px;
            width: 12px;
            height: 2px;
            background: currentcolor;
          }

          &::before {
            rotate: 45deg;
          }

          &::after {
            rotate: -45deg;
          }
        }
      }

      .chip-ghost {
        position: fixed;
        margin: 0;
        pointer-events: none;
        z-index: 10;
        transform-origin: center;
        opacity: 1;
        scale: 1;
        transition:
          opacity 0.4s ease,
          scale 0.8s var(--spring-bouncy);

        &.is-exiting {
          opacity: 0;
          scale: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="chip-row" data-row>
          <div class="chip"><span>Motion</span><button></button></div>
          <div class="chip"><span>Popover</span><button></button></div>
          <div class="chip"><span>Dialog</span><button></button></div>
          <div class="chip"><span>Anchor</span><button></button></div>
          <div class="chip"><span>Spring</span><button></button></div>
        </div>
      </section>
    </main>
    <script type="module">
      const row = document.querySelector("[data-row]");

      const animateShift = (before) => {
        const shifted = [];

        // Replaying the layout delta keeps the row readable even though the chip is removed immediately.
        for (const chip of row.children) {
          const previous = before.get(chip);
          if (!previous) continue;
          const next = chip.getBoundingClientRect();
          const deltaX = previous.left - next.left;
          const deltaY = previous.top - next.top;
          if (deltaX === 0 && deltaY === 0) continue;
          chip.classList.remove("is-shifting");
          chip.style.setProperty("--shift-x", `${deltaX}px`);
          chip.style.setProperty("--shift-y", `${deltaY}px`);
          chip.style.setProperty("--shift-scale", "0.9");
          shifted.push(chip);
        }

        void row.offsetWidth;

        requestAnimationFrame(() => {
          for (const chip of shifted) {
            chip.classList.add("is-shifting");
            chip.style.setProperty("--shift-x", "0px");
            chip.style.setProperty("--shift-y", "0px");
            chip.style.setProperty("--shift-scale", "1");
          }
        });
      };

      const animateGhost = (chip) => {
        const rect = chip.getBoundingClientRect();
        // A fixed ghost preserves the exit motion while the live row can reflow immediately.
        const ghost = chip.cloneNode(true);
        ghost.classList.add("chip-ghost");
        ghost.style.top = `${rect.top}px`;
        ghost.style.left = `${rect.left}px`;
        ghost.style.width = `${rect.width}px`;
        ghost.style.height = `${rect.height}px`;
        ghost.style.transformOrigin = "center";
        document.body.append(ghost);
        const removeGhost = (event) => {
          if (event.propertyName !== "opacity") return;
          ghost.removeEventListener("transitionend", removeGhost);
          ghost.remove();
        };
        ghost.addEventListener("transitionend", removeGhost);
        requestAnimationFrame(() => {
          ghost.classList.add("is-exiting");
        });
      };

      row.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        const chip = button.closest(".chip");
        const before = new Map([...row.children].map((item) => [item, item.getBoundingClientRect()]));
        animateGhost(chip);
        chip.remove();
        animateShift(before);
      });
    </script>
  </body>
</html>
