<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .chip {
        --shift-x: 0px;
        --shift-y: 0px;
        --shift-scale: 1;

        display: inline flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding-inline: 14px;
        border: 1px solid var(--color-line);
        border-radius: 999px;
        background: var(--color-surface);
        user-select: none;
        translate: var(--shift-x) var(--shift-y);
        scale: var(--shift-scale);

        &.is-shifting {
          transition:
            translate 1.2s var(--spring-bouncy),
            scale 1.2s var(--spring-bouncy);
        }

        button {
          position: relative;
          display: inline grid;
          place-items: center;
          width: 24px;
          height: 24px;
          padding: 0;
          border: 0;
          border-radius: 10px;
          background: transparent;
          cursor: pointer;
          color: var(--color-muted);
          transition: color 0.2s;

          @media (any-hover: hover) {
            &:hover {
              color: var(--color-accent);
            }
          }

          .chip-dismiss-icon {
            position: relative;
            width: 12px;
            height: 12px;
            rotate: 0deg;
            transition: rotate 0.8s var(--spring-default);
            pointer-events: none;

            &::before,
            &::after {
              content: "";
              position: absolute;
              top: 50%;
              left: 50%;
              translate: -50% -50%;
              width: 12px;
              height: 2px;
              background: currentcolor;
            }

            &::before {
              rotate: 45deg;
            }

            &::after {
              rotate: -45deg;
            }
          }

          @media (any-hover: hover) {
            &:hover .chip-dismiss-icon {
              rotate: 90deg;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="chip-row" data-row>
          <div class="chip">
            <span>Motion</span
            ><button aria-label="Dismiss Motion" title="Dismiss Motion">
              <span class="chip-dismiss-icon"></span>
            </button>
          </div>
          <div class="chip">
            <span>Popover</span
            ><button aria-label="Dismiss Popover" title="Dismiss Popover">
              <span class="chip-dismiss-icon"></span>
            </button>
          </div>
          <div class="chip">
            <span>Dialog</span
            ><button aria-label="Dismiss Dialog" title="Dismiss Dialog">
              <span class="chip-dismiss-icon"></span>
            </button>
          </div>
          <div class="chip">
            <span>Anchor</span
            ><button aria-label="Dismiss Anchor" title="Dismiss Anchor">
              <span class="chip-dismiss-icon"></span>
            </button>
          </div>
          <div class="chip">
            <span>Spring</span
            ><button aria-label="Dismiss Spring" title="Dismiss Spring">
              <span class="chip-dismiss-icon"></span>
            </button>
          </div>
        </div>
      </div>
    </main>
    <script>
      const row = document.querySelector("[data-row]");

      /**
       * Replays the FLIP delta on every surviving chip after one chip has been removed.
       *
       * @param {Map<Element, DOMRect>} before
       */
      function animateShift(before) {
        const shifted = [];

        // This demo uses FLIP for the remaining chips:
        // First = remember each chip before layout changes.
        // Last = remove one chip, then measure where the others ended up.
        // Invert = move each survivor back by the delta so it visually stays in place for a frame.
        // Play = animate that delta back to zero with the spring easing.
        for (const chip of row.children) {
          const previous = before.get(chip);
          if (!previous) continue;
          const next = chip.getBoundingClientRect();
          const deltaX = previous.left - next.left;
          const deltaY = previous.top - next.top;
          if (deltaX === 0 && deltaY === 0) continue;
          chip.classList.remove("is-shifting");
          chip.style.setProperty("--shift-x", `${deltaX}px`);
          chip.style.setProperty("--shift-y", `${deltaY}px`);
          chip.style.setProperty("--shift-scale", "0.8");
          shifted.push(chip);
        }

        requestAnimationFrame(() => {
          for (const chip of shifted) {
            chip.classList.add("is-shifting");
            chip.style.setProperty("--shift-x", "0px");
            chip.style.setProperty("--shift-y", "0px");
            chip.style.setProperty("--shift-scale", "1");
          }
        });
      }

      function handleRowClick(event) {
        const button = event.target.closest("button");
        if (!button) return;
        const chip = button.closest(".chip");
        if (row.children.length === 1) {
          // Refresh for demo 😁
          location.reload();
          return;
        }

        // First: capture the chips before removal so animateShift() can run the FLIP delta.
        const before = new Map([...row.children].map((item) => [item, item.getBoundingClientRect()]));
        chip.remove();
        animateShift(before);
      }

      row.addEventListener("click", handleRowClick);
    </script>
  </body>
</html>
