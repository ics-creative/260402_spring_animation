<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .sheet {
        --surface-radius: 16px;

        position: fixed;
        inset: auto auto 12px 50%;
        width: min(380px, calc(100vw - 20px));
        max-height: calc(100dvh - 24px);
        max-width: none;
        margin: 0;
        padding: 0;
        display: none;
        flex-direction: column;
        overflow: clip;
        opacity: 0;
        translate: -50% calc(100% + 96px);
        transition:
          opacity 0.3s linear,
          translate 0.4s ease,
          display 0.2s allow-discrete,
          overlay 0.2s allow-discrete;

        &[open] {
          display: flex;
          opacity: 1;
          translate: -50% 0;
          transition:
            opacity 0.3s linear,
            translate 1.2s var(--spring-default),
            display 0.2s allow-discrete,
            overlay 0.2s allow-discrete;

          @starting-style {
            opacity: 0;
            translate: -50% calc(100% + 160px);
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 32%);
          opacity: 0;
          transition: opacity 0.5s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }

        .sheet-header {
          display: grid;
          grid-template-columns: 1fr auto;
          align-items: start;
          gap: 4px 12px;
          padding: 18px 18px 10px;
          text-align: left;

          .sheet-eyebrow,
          .sheet-title,
          .sheet-message {
            margin: 0;
          }

          .sheet-eyebrow {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--color-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
          }

          .sheet-title {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.02em;
          }

          .sheet-message {
            grid-column: 1 / -1;
            font-size: 0.875rem;
            color: var(--color-muted);
            line-height: 1.45;
          }
        }

        .sheet-actions {
          display: flex;
          flex: 0 1 auto;
          flex-direction: column;
          min-height: 0;
          padding: 4px 0 0;
          overflow: auto;

          .sheet-action {
            width: 100%;
            min-height: 56px;
            padding: 14px 18px;
            border: 0;
            border-top: 1px solid var(--color-line);
            border-radius: 0;
            justify-content: start;
            place-items: start start;
            background: var(--color-surface);
            color: var(--color-text);
            font-weight: 500;
            display: grid;
            gap: 1px;
            text-align: left;
            transition: all 0.2s;

            &:hover {
              transform: none;
              color: var(--color-text);
              border-color: transparent;
              background: var(--color-surface-hover);
            }

            &:active {
              scale: 1;
            }

            &.sheet-action-destructive {
              color: var(--color-text);

              &:hover {
                color: var(--color-text);
                border-color: transparent;
                background: var(--color-surface-hover);
              }
            }

            .sheet-action-title,
            .sheet-action-note {
              margin: 0;
            }

            .sheet-action-title {
              font-size: 0.96rem;
              font-weight: 600;
              letter-spacing: -0.01em;
            }

            .sheet-action-note {
              font-size: 0.8rem;
              color: var(--color-muted);
              line-height: 1.35;
              text-align: left;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <button class="button sheet-open" commandfor="bottom-sheet" command="show-modal">Open Action Sheet</button>
      </div>
      <dialog class="sheet surface-card" id="bottom-sheet" closedby="any">
        <div class="sheet-header">
          <p class="sheet-eyebrow">Photo</p>
          <button
            class="button close-button"
            aria-label="Close sheet"
            title="Close sheet"
            commandfor="bottom-sheet"
            command="close"
          >
            <span class="close-icon"></span>
          </button>
          <p class="sheet-title">Photo Actions</p>
          <p class="sheet-message">Choose what you want to do with this photo.</p>
        </div>
        <div class="sheet-actions">
          <button class="button sheet-action" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Save to Files</span>
            <span class="sheet-action-note">Download a copy to your device.</span>
          </button>
          <button class="button sheet-action" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Copy Link</span>
            <span class="sheet-action-note">Share the current photo URL.</span>
          </button>
          <button class="button sheet-action" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Add to Album</span>
            <span class="sheet-action-note">Move it into another collection.</span>
          </button>
          <button class="button sheet-action sheet-action-destructive" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Delete Photo</span>
            <span class="sheet-action-note">Remove it permanently from this workspace.</span>
          </button>
        </div>
      </dialog>
    </main>
  </body>
</html>
