<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      :root {
        /* anime.js spring default: https://animejs.com/easing-editor/spring/default */

        /* prettier-ignore */
        --spring-default: linear(0, 0.0107, 0.0398, 0.0834, 0.138, 0.2003, 0.2677, 0.3379, 0.4089, 0.4791, 0.5471, 0.612, 0.6731, 0.7297, 0.7815, 0.8283, 0.87, 0.9068, 0.9388, 0.9662, 0.9892, 1.0083, 1.0237, 1.0357, 1.0449, 1.0514, 1.0556, 1.058, 1.0587, 1.0581, 1.0563, 1.0538, 1.0506, 1.0469, 1.043, 1.0388, 1.0347, 1.0306, 1.0266, 1.0228, 1.0192, 1.0159, 1.0128, 1.0101, 1.0076, 1.0055, 1.0036, 1.002, 1.0006, 0.9995, 0.9986, 0.9979, 0.9974, 0.997, 0.9967, 0.9966, 0.9966, 0.9966, 0.9967, 0.9968, 0.997, 0.9972, 0.9975, 0.9977, 0.998, 0.9982, 0.9984, 0.9987, 0.9989, 0.9991, 0.9992, 0.9994, 0.9996, 0.9997, 0.9998, 0.9999, 1, 1, 1.0001, 1.0001, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1, 1, 1);

        /* anime.js spring bouncy: https://animejs.com/easing-editor/spring/bouncy */

        /* prettier-ignore */
        --spring-bouncy: linear(0, 0.0222, 0.0833, 0.1743, 0.2867, 0.4123, 0.5436, 0.6739, 0.7978, 0.911, 1.0102, 1.0934, 1.1594, 1.2082, 1.2403, 1.2569, 1.2599, 1.2511, 1.2328, 1.2074, 1.177, 1.1437, 1.1095, 1.0759, 1.0443, 1.0157, 0.991, 0.9705, 0.9546, 0.9431, 0.9359, 0.9326, 0.9327, 0.9357, 0.941, 0.9481, 0.9562, 0.965, 0.9739, 0.9826, 0.9906, 0.9978, 1.0039, 1.0089, 1.0128, 1.0154, 1.017, 1.0176, 1.0174, 1.0164, 1.0149, 1.013, 1.0108, 1.0085, 1.0062, 1.0039, 1.0019, 1.0001, 0.9986, 0.9974, 0.9965, 0.9958, 0.9955, 0.9954, 0.9955, 0.9958, 0.9963, 0.9968, 0.9974, 0.998, 0.9986, 0.9991, 0.9996, 1.0001, 1.0005, 1.0008, 1.001, 1.0011, 1.0012, 1.0012, 1.0011, 1.0011, 1.0009, 1.0008, 1.0006, 1.0005, 1.0003, 1.0002, 1.0001, 0.9999, 0.9999, 0.9998, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9998, 0.9998, 1);
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .sheet {
        --surface-radius: 16px;

        position: fixed;
        inset: auto auto 12px 50%;
        width: min(380px, calc(100vw - 20px));
        max-height: calc(100dvh - 24px);
        max-width: none;
        margin: 0;
        padding: 0;
        display: none;
        flex-direction: column;
        overflow: clip;
        opacity: 0;
        translate: -50% calc(100% + 96px);
        transition:
          opacity 0.3s linear,
          translate 0.4s ease,
          display 0.2s allow-discrete,
          overlay 0.2s allow-discrete;

        &[open] {
          display: flex;
          opacity: 1;
          translate: -50% 0;
          transition:
            opacity 0.3s linear,
            translate 1.2s var(--spring-default),
            display 0.2s allow-discrete,
            overlay 0.2s allow-discrete;

          @starting-style {
            opacity: 0;
            translate: -50% calc(100% + 160px);
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 32%);
          opacity: 0;
          transition: opacity 0.5s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }

        .sheet-header {
          display: grid;
          grid-template-columns: 1fr auto;
          align-items: start;
          gap: 4px 12px;
          padding: 20px 20px 12px;
          text-align: left;

          .sheet-eyebrow,
          .sheet-title,
          .sheet-message {
            margin: 0;
          }

          .sheet-eyebrow {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--color-muted);
            text-transform: uppercase;
          }

          .sheet-title {
            font-size: 1rem;
            font-weight: bold;
          }

          .sheet-message {
            grid-column: 1 / -1;
            font-size: 0.875rem;
            color: var(--color-muted);
            line-height: 1.45;
          }
        }

        .sheet-actions {
          display: flex;
          flex: 0 1 auto;
          flex-direction: column;
          min-height: 0;
          padding: 4px 0 0;
          overflow: auto;

          .sheet-action {
            width: 100%;
            min-height: 56px;
            padding: 16px 20px;
            border: 0;
            border-top: 1px solid var(--color-line);
            border-radius: 0;
            justify-content: start;
            place-items: start start;
            background: var(--color-surface);
            color: var(--color-text);
            display: grid;
            gap: 1px;
            text-align: left;
            transition: all 0.2s;

            @media (any-hover: hover) {
              &:hover {
                transform: none;
                color: var(--color-text);
                border-color: transparent;
                background: var(--color-surface-hover);
              }
            }

            &:active {
              scale: 1;
            }

            &.sheet-action-destructive {
              color: var(--color-text);

              @media (any-hover: hover) {
                &:hover {
                  color: var(--color-text);
                  border-color: transparent;
                  background: var(--color-surface-hover);
                }
              }
            }

            .sheet-action-title,
            .sheet-action-note {
              margin: 0;
            }

            .sheet-action-title {
              font-size: 1rem;
              font-weight: bold;
            }

            .sheet-action-note {
              font-size: 0.75rem;
              color: var(--color-muted);
              line-height: 1.35;
              text-align: left;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <button class="button" commandfor="bottom-sheet" command="show-modal">Open Action Sheet</button>
      </div>
      <dialog class="sheet surface-card" id="bottom-sheet" closedby="any">
        <div class="sheet-header">
          <p class="sheet-eyebrow">Photo</p>
          <button class="button close-button" title="Close sheet" commandfor="bottom-sheet" command="close">
            <span class="close-icon"></span>
          </button>
          <p class="sheet-title">Photo Actions</p>
          <p class="sheet-message">Choose what you want to do with this photo.</p>
        </div>
        <div class="sheet-actions">
          <button class="button sheet-action" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Save to Files</span>
            <span class="sheet-action-note">Download a copy to your device.</span>
          </button>
          <button class="button sheet-action" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Copy Link</span>
            <span class="sheet-action-note">Share the current photo URL.</span>
          </button>
          <button class="button sheet-action sheet-action-destructive" commandfor="bottom-sheet" command="close">
            <span class="sheet-action-title">Delete Photo</span>
            <span class="sheet-action-note">Remove it permanently from this workspace.</span>
          </button>
        </div>
      </dialog>
    </main>
  </body>
</html>
