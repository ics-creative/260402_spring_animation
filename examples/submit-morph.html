<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .submit {
        position: relative;
        width: 160px;
        height: 56px;
        min-height: 56px;
        padding: 0;
        overflow: clip;
        transition:
          width 0.68s var(--spring-anchor),
          border-radius 0.68s var(--spring-anchor),
          scale 0.68s var(--spring-anchor),
          translate 0.68s var(--spring-soft),
          background-color 0.2s,
          color 0.2s;

        .submit__label,
        .submit__icon,
        .submit__spinner {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
        }

        .submit__label,
        .submit__icon,
        .submit__spinner::before {
          transition:
            opacity 0.18s,
            scale 0.46s var(--spring-anchor),
            translate 0.46s var(--spring-soft),
            rotate 0.46s var(--spring-anchor);
        }

        .submit__icon,
        .submit__spinner {
          opacity: 0;
          scale: 0.55;
        }

        .submit__icon svg {
          width: 22px;
          height: 22px;
          scale: 0.82;
          stroke: currentColor;
          stroke-width: 2.75;
          stroke-linecap: round;
          stroke-linejoin: round;
          fill: none;
          transform-box: fill-box;
          transform-origin: center;
          transition: scale 0.34s var(--spring-soft);
        }

        .submit__icon path {
          stroke-dasharray: 24;
          stroke-dashoffset: 24;
          transition: stroke-dashoffset 0.36s ease-out 0.04s;
        }

        .submit__spinner::before {
          content: "";
          width: 22px;
          height: 22px;
          border: 2px solid currentColor;
          border-right-color: transparent;
          border-radius: 50%;
          rotate: -90deg;
          scale: 0.92;
        }

        &[data-state="loading"],
        &[data-state="done"] {
          width: 56px;
          border-radius: 28px;
          cursor: default;
        }

        &[data-state="loading"] {
          scale: 1;
          translate: 0 0;

          .submit__label {
            opacity: 0;
            scale: 0.45;
            translate: 0 -10px;
          }

          .submit__spinner {
            opacity: 1;
            scale: 1;
          }

          .submit__spinner::before {
            rotate: 0deg;
            scale: 1.06;
            animation: submit-spinner-rotate 0.72s linear infinite;
          }
        }

        &[data-state="done"] {
          background: var(--accent);
          border-color: var(--accent);
          color: var(--accent-contrast);
          scale: 1;
          translate: 0 0;

          .submit__label,
          .submit__spinner {
            opacity: 0;
            scale: 0.42;
            translate: 0 10px;
          }

          .submit__icon {
            opacity: 1;
            scale: 1;
            translate: 0 0;
          }

          .submit__icon svg {
            scale: 1;
          }

          .submit__icon path {
            stroke-dashoffset: 0;
          }
        }

        &:disabled {
          pointer-events: none;
        }

        &[data-state="loading"]:hover,
        &[data-state="done"]:hover {
          transform: none;
          color: inherit;
          border-color: inherit;
        }
      }

      @keyframes submit-spinner-rotate {
        to {
          rotate: 360deg;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button submit" data-submit data-state="idle">
          <span class="submit__label">Submit</span>
          <span class="submit__spinner"></span>
          <span class="submit__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 12.5l4.2 4.2L19 7.4"></path>
            </svg>
          </span>
        </button>
      </section>
    </main>
    <script type="module">
      const button = document.querySelector("[data-submit]");
      const setState = (state) => {
        button.dataset.state = state;
        button.disabled = state !== "idle";
      };

      button.addEventListener("click", () => {
        if (button.dataset.state !== "idle") return;
        setState("loading");
        setTimeout(() => {
          setState("done");
        }, 1050);
        setTimeout(() => {
          setState("idle");
        }, 2200);
      });
    </script>
  </body>
</html>
