<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .action-anchor-1 {
        anchor-name: --action-1;
      }

      .action-anchor-2 {
        anchor-name: --action-2;
      }

      .action-anchor-3 {
        anchor-name: --action-3;
      }

      .popover {
        position: absolute;
        inset: auto;
        margin: 0;
        width: min(220px, calc(100vw - 32px));
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        display: block;
        block-size: max-content;
        position-area: block-end center;
        margin-block-start: 12px;
        position-try: block-start center;
        place-self: start center;
        transform-origin: center top;
        opacity: 0;
        translate: 0 -24px;
        scale: 0;
        transition:
          opacity 0.2s linear,
          translate 1s var(--spring-default),
          scale 1s var(--spring-default),
          display 1s allow-discrete,
          overlay 1s allow-discrete;

        /* Opening gets the spring. Closing stays short and plain so the menu does not bounce away. */
        &:popover-open {
          opacity: 1;
          translate: 0 0;
          scale: 1;
        }
      }

      .popover-menu {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .popover-item {
        min-width: 0;
      }

      .popover-action {
        width: 100%;
        min-height: 40px;
        padding: 0 12px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        color: var(--text);
        transition: all 0.2s;

        &:hover {
          background: color-mix(in srgb, var(--surface) 94%, var(--text) 6%);
        }

        &:active {
          scale: 1;
        }
      }

      .popover-label,
      .popover-meta {
        display: block;
        margin: 0;
      }

      .popover-label {
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: -0.01em;
      }

      .popover-meta {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .popover-anchor-1 {
        position-anchor: --action-1;
      }

      .popover-anchor-2 {
        position-anchor: --action-2;
      }

      .popover-anchor-3 {
        position-anchor: --action-3;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="row">
          <button class="button action action-anchor-1" commandfor="popover-1" command="toggle-popover">Share</button>
          <button class="button action action-anchor-2" commandfor="popover-2" command="toggle-popover">Invite</button>
          <button class="button action action-anchor-3" commandfor="popover-3" command="toggle-popover">Move</button>
        </div>
      </section>
      <div class="popover popover-anchor-1" id="popover-1" popover>
        <ul class="popover-menu">
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Copy link</span>
              <span class="popover-meta">Cmd+C</span>
            </button>
          </li>
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Send by email</span>
              <span class="popover-meta">Open</span>
            </button>
          </li>
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Manage access</span>
              <span class="popover-meta">More</span>
            </button>
          </li>
        </ul>
      </div>
      <div class="popover popover-anchor-2" id="popover-2" popover>
        <ul class="popover-menu">
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Add reviewer</span>
              <span class="popover-meta">Add</span>
            </button>
          </li>
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Copy invite</span>
              <span class="popover-meta">Cmd+C</span>
            </button>
          </li>
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">View guests</span>
              <span class="popover-meta">Open</span>
            </button>
          </li>
        </ul>
      </div>
      <div class="popover popover-anchor-3" id="popover-3" popover>
        <ul class="popover-menu">
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Move to next</span>
              <span class="popover-meta">Next</span>
            </button>
          </li>
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Send to backlog</span>
              <span class="popover-meta">Backlog</span>
            </button>
          </li>
          <li class="popover-item">
            <button class="popover-action" type="button">
              <span class="popover-label">Archive task</span>
              <span class="popover-meta">Archive</span>
            </button>
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
