<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      html,
      body {
        overflow-x: hidden;
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .drawer {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        max-width: none;
        max-height: none;
        margin: 0;
        padding: 0;
        border: 0;
        background: none;
        overflow: hidden;
        transition:
          display 0.2s allow-discrete,
          overlay 0.2s allow-discrete;

        &::backdrop {
          background: rgb(0 0 0 / 28%);
        }

        .drawer-viewport {
          position: fixed;
          inset: 0;
          display: flex;
          justify-content: flex-end;
          width: 100%;
          height: 100%;
          overflow: hidden;
          pointer-events: none;
        }

        .drawer-shell {
          position: relative;
          flex: none;
          width: min(380px, calc(100% - 24px));
          min-height: 100%;
          overflow: visible;
          pointer-events: auto;
          translate: calc(100% + 24px) 0;
          z-index: 1;
          transition: translate 1s var(--spring-strong);

          /* The main surface and the extra right cushion move as one piece with the drawer shell. */
          &::before {
            content: "";
            position: absolute;
            inset: 0;
            border-inline-start: 1px solid var(--line);
            background: var(--surface);
          }

          &::after {
            content: "";
            position: absolute;
            top: 0;
            right: -56px;
            bottom: 0;
            width: 56px;
            background: var(--surface);
          }
        }

        .drawer-panel {
          position: relative;
          min-height: 100%;
          padding: 16px;
          display: grid;
          gap: 12px;
        }

        .drawer-nav {
          display: grid;
          align-content: start;
          gap: 12px;
        }

        .drawer-item {
          justify-content: flex-start;
        }

        .drawer-footer {
          margin-top: auto;
          padding-top: 4px;
          display: flex;
          justify-content: flex-end;
        }

        &[open] {
          display: block;

          @starting-style {
            display: block;
          }

          .drawer-shell {
            translate: 0 0;

            @starting-style {
              translate: calc(100% + 24px) 0;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button" commandfor="side-drawer" command="show-modal">Open Drawer</button>
      </section>
      <dialog class="drawer" id="side-drawer" closedby="any">
        <div class="drawer-viewport">
          <div class="drawer-shell">
            <div class="drawer-panel">
              <div class="drawer-nav">
                <button class="button drawer-item">Overview</button>
                <button class="button drawer-item">Members</button>
                <button class="button drawer-item">Publishing</button>
                <button class="button drawer-item">Integrations</button>
              </div>
              <div class="drawer-footer">
                <button class="button" commandfor="side-drawer" command="close">Close</button>
              </div>
            </div>
          </div>
        </div>
      </dialog>
    </main>
    <script type="module">
      const drawer = document.querySelector("#side-drawer");

      // closedby="any" should light-dismiss, but this keeps outside click working where that support still falls short.
      drawer.addEventListener("click", (event) => {
        if (event.target !== drawer) return;
        drawer.close();
      });
    </script>
  </body>
</html>
