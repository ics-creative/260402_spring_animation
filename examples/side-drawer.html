<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      html,
      body {
        overflow-x: hidden;
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .drawer {
        position: fixed;
        inset: 0 0 0 auto;
        width: min(436px, 100vw);
        height: 100dvh;
        max-width: none;
        max-height: none;
        margin: 0;
        padding: 16px 72px 16px 16px;
        border: 0;
        border-inline-start: 1px solid var(--line);
        background: var(--surface);
        overflow: hidden;
        translate: calc(100% + 64px) 0;
        transition:
          translate 1s var(--spring-default),
          display 1s allow-discrete,
          overlay 1s allow-discrete;

        &::backdrop {
          background: rgb(0 0 0 / 28%);
          opacity: 0;
          transition: opacity 0.4s;
        }

        &::after {
          content: "";
          position: absolute;
          top: 0;
          right: 0;
          bottom: 0;
          width: 64px;
          background: var(--surface);
        }

        .drawer-nav {
          display: grid;
          align-content: start;
          gap: 12px;
        }

        .drawer-item {
          justify-content: flex-start;
        }

        .drawer-footer {
          margin-top: auto;
          padding-top: 4px;
          display: flex;
          justify-content: flex-end;
        }

        &[open] {
          display: grid;
          grid-template-rows: 1fr auto;
          gap: 12px;
          translate: 128px 0;

          @starting-style {
              translate: calc(100%) 0;
          }

          &::backdrop {
            opacity: 1;

            @starting-style {
              opacity: 0;
            }
          }

        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button" commandfor="side-drawer" command="show-modal">Open Drawer</button>
      </section>
      <dialog class="drawer" id="side-drawer" closedby="any">
        <div class="drawer-nav">
          <button class="button drawer-item">Overview</button>
          <button class="button drawer-item">Members</button>
          <button class="button drawer-item">Publishing</button>
          <button class="button drawer-item">Integrations</button>
        </div>
        <div class="drawer-footer">
          <button class="button" commandfor="side-drawer" command="close">Close</button>
        </div>
      </dialog>
    </main>
  </body>
</html>
