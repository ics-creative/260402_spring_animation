<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      html,
      body {
        overflow-x: hidden;
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .drawer {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        max-width: none;
        max-height: none;
        margin: 0;
        padding: 0;
        border: 0;
        background: none;
        overflow: hidden;
        transition:
          display 0.24s allow-discrete,
          overlay 0.24s allow-discrete;

        &[open] {
          display: block;

          @starting-style {
            display: block;
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 28%);
          opacity: 0;
          transition: opacity 0.24s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }

        .drawer__viewport {
          position: fixed;
          inset: 0;
          display: flex;
          justify-content: flex-end;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        .drawer__shell {
          position: relative;
          flex: none;
          width: min(380px, calc(100% - 24px));
          min-height: 100%;
          overflow: hidden;
          translate: 100% 0;
          transition: translate 0.96s var(--spring-anchor);

          /* The shell clips the overshoot so the viewport never grows to the right. */
          &::before {
            content: "";
            position: absolute;
            inset: 0;
            border-inline-start: 1px solid var(--line);
            background: var(--surface);
          }
        }

        .drawer__panel {
          position: relative;
          min-height: 100%;
          padding: 16px;
          display: grid;
          align-content: start;
          gap: 12px;
        }

        .drawer__item {
          justify-content: flex-start;
        }

        &[open] {
          .drawer__shell {
            translate: 0 0;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button" commandfor="side-drawer" command="show-modal">Open Drawer</button>
      </section>
      <dialog class="drawer" id="side-drawer">
        <div class="drawer__viewport">
          <div class="drawer__shell">
            <div class="drawer__panel">
              <button class="button drawer__item">Overview</button>
              <button class="button drawer__item">Members</button>
              <button class="button drawer__item">Publishing</button>
              <button class="button drawer__item">Integrations</button>
              <button class="button drawer__item" commandfor="side-drawer" command="close">Close</button>
            </div>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
