<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      html,
      body {
        overflow-x: hidden;
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .drawer {
        position: fixed;
        inset: 0 0 0 auto;
        width: min(436px, 100vw);
        height: 100dvh;
        max-width: none;
        max-height: none;

        /* オーバーシュート時に見切れないように右側の座布団を表示させる  */
        overflow: visible;
        margin: 0;
        padding: 16px;
        border: 0;
        border-inline-start: 1px solid var(--line);
        background: var(--surface);
        grid-template-rows: auto 1fr;
        align-content: start;
        gap: 16px;
        translate: calc(100%) 0;
        transition:
          translate 1s var(--spring-default),
          display 1s allow-discrete,
          overlay 1s allow-discrete;

        &::backdrop {
          background: rgb(0 0 0 / 28%);
          opacity: 0;
          transition: opacity 0.4s;
        }

        /* オーバーシュート時に見切れないように右側に座布団を設ける  */
        &::after {
          content: "";
          position: absolute;
          top: 0;
          right: -128px;
          bottom: 0;
          width: 128px;
          background: var(--surface);
        }

        .drawer-nav {
          display: grid;
          align-content: start;
          gap: 12px;
        }

        .drawer-header {
          display: flex;
          justify-content: flex-end;
        }

        .drawer-item {
          justify-content: flex-start;
        }

        &[open] {
          display: grid;
          translate: 0 0;

          @starting-style {
            translate: calc(100%) 0;
          }

          &::backdrop {
            opacity: 1;

            @starting-style {
              opacity: 0;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button" commandfor="side-drawer" command="show-modal">Open Drawer</button>
      </section>
      <dialog class="drawer" id="side-drawer" closedby="any">
        <div class="drawer-header">
          <button class="button close-button" aria-label="Close drawer" commandfor="side-drawer" command="close">
            <span class="close-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="drawer-nav">
          <button class="button drawer-item">Overview</button>
          <button class="button drawer-item">Members</button>
          <button class="button drawer-item">Publishing</button>
          <button class="button drawer-item">Integrations</button>
        </div>
      </dialog>
    </main>
  </body>
</html>
