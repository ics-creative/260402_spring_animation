<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .switch {
        display: inline-block;
        cursor: pointer;

        .track {
          display: block;
          width: 78px;
          height: 44px;
          padding: 4px;
          border-radius: 22px;
          background: var(--line);
          transition: all 0.8s var(--spring-default);
        }

        .knob {
          display: block;
          width: 36px;
          height: 36px;
          border-radius: 50%;
          background: var(--surface);
          border: 1px solid var(--line);
          translate: 0 0;
          transition: all 0.8s var(--spring-default);
        }
      }

      .switch-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;

        &:checked + .switch {
          .track {
            background: var(--accent);
          }

          .knob {
            translate: 34px 0;
            scale: 1.06;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <input class="switch-input" id="toggle-switch" type="checkbox" />
        <label class="switch" for="toggle-switch">
          <span class="track">
            <span class="knob"></span>
          </span>
        </label>
      </section>
    </main>
  </body>
</html>
