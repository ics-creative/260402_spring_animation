<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      @property --active {
        syntax: "<number>";
        inherits: true;
        initial-value: 0;
      }

      :root {
          /* anime.js outElastic: https://animejs.com/easing-editor/elastic/outelastic */
          /* prettier-ignore */
        --elastic-out: linear(0, 0.1935, 0.3985, 0.6042, 0.8012, 0.9816, 1.1396, 1.2707, 1.3727, 1.4446, 1.487, 1.5019, 1.4922, 1.4614, 1.4138, 1.3536, 1.2851, 1.2127, 1.1399, 1.0703, 1.0065, 0.9507, 0.9043, 0.8682, 0.8428, 0.8278, 0.8225, 0.826, 0.8369, 0.8537, 0.875, 0.8992, 0.9248, 0.9505, 0.9751, 0.9977, 1.0174, 1.0338, 1.0466, 1.0556, 1.0609, 1.0627, 1.0615, 1.0577, 1.0517, 1.0442, 1.0356, 1.0266, 1.0175, 1.0088, 1.0008, 0.9938, 0.988, 0.9835, 0.9804, 0.9785, 0.9778, 0.9782, 0.9796, 0.9817, 0.9844, 0.9874, 0.9906, 0.9938, 0.9969, 0.9997, 1.0022, 1.0042, 1.0058, 1.0069, 1.0076, 1.0078, 1.0077, 1.0072, 1.0065, 1.0055, 1.0045, 1.0033, 1.0022, 1.0011, 1.0001, 0.9992, 0.9985, 0.9979, 0.9975, 0.9973, 0.9972, 0.9973, 0.9975, 0.9977, 0.998, 0.9984, 0.9988, 0.9992, 0.9996, 1, 1.0003, 1.0005, 1.0007, 1.0009, 1);
      }

      .stage {
        min-height: auto;
        padding: 0;
        background: var(--surface);
        gap: 0;
        font-family: "Helvetica Neue", "Segoe UI", sans-serif;
        font-weight: 900;
      }

      .story-list {
        width: 100%;
      }

      .story {
        min-height: 100vh;
        display: grid;
        align-items: center;
      }

      .story-frame {
        min-height: auto;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .headline {
        --active: 0;

        margin: 0;
        display: grid;
        justify-items: center;
        gap: 0.05em;
        font-size: clamp(3rem, 11vw, 8rem);
        line-height: 0.88;
        text-wrap: balance;
        timeline-trigger: --reveal view() contain 15% contain 85% / entry 100% exit 0%;
        trigger-scope: --reveal;
        animation: reveal-flag 1ms steps(1, end) both;
        animation-trigger: --reveal play-forwards play-backwards;
      }

      .line {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.04em;
      }

      .letter {
        --offset: 0;
        --index: calc(var(--offset) + sibling-index() - 1);

        display: inline-block;
        transition:
          translate 1.5s var(--elastic-out),
          scale 1.5s var(--elastic-out);
        translate: 0 calc((1 - var(--active)) * 0.6em);
        scale: var(--active);
        transition-delay: calc(var(--index) * 0.05s);
      }

      .glyph {
        display: inline-block;
      }

      .line-offset-4 {
        --offset: 4;
      }

      .line-offset-5 {
        --offset: 5;
      }

      .line-offset-6 {
        --offset: 6;
      }

      /* Scroll triggers can currently start animations, so this 1ms bridge only flips the reveal flag. */
      @keyframes reveal-flag {
        to {
          --active: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="story-list">
          <section class="story">
            <div class="story-frame">
              <p class="headline">
                <span class="line">
                  <span class="letter"><span class="glyph">S</span></span>
                  <span class="letter"><span class="glyph">P</span></span>
                  <span class="letter"><span class="glyph">R</span></span>
                  <span class="letter"><span class="glyph">I</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                  <span class="letter"><span class="glyph">G</span></span>
                </span>
                <span class="line line-offset-6">
                  <span class="letter"><span class="glyph">T</span></span>
                  <span class="letter"><span class="glyph">Y</span></span>
                  <span class="letter"><span class="glyph">P</span></span>
                  <span class="letter"><span class="glyph">E</span></span>
                </span>
              </p>
            </div>
          </section>

          <section class="story">
            <div class="story-frame">
              <p class="headline">
                <span class="line">
                  <span class="letter"><span class="glyph">S</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                  <span class="letter"><span class="glyph">A</span></span>
                  <span class="letter"><span class="glyph">P</span></span>
                </span>
                <span class="line line-offset-4">
                  <span class="letter"><span class="glyph">O</span></span>
                  <span class="letter"><span class="glyph">P</span></span>
                  <span class="letter"><span class="glyph">E</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                </span>
              </p>
            </div>
          </section>

          <section class="story">
            <div class="story-frame">
              <p class="headline">
                <span class="line">
                  <span class="letter"><span class="glyph">C</span></span>
                  <span class="letter"><span class="glyph">L</span></span>
                  <span class="letter"><span class="glyph">E</span></span>
                  <span class="letter"><span class="glyph">A</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                </span>
                <span class="line line-offset-5">
                  <span class="letter"><span class="glyph">E</span></span>
                  <span class="letter"><span class="glyph">X</span></span>
                  <span class="letter"><span class="glyph">I</span></span>
                  <span class="letter"><span class="glyph">T</span></span>
                </span>
              </p>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
