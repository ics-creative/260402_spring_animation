<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      :root {
        /* anime.js spring bouncy: https://animejs.com/easing-editor/spring/bouncy */

        /* prettier-ignore */
        --spring-bouncy: linear(0, 0.0222, 0.0833, 0.1743, 0.2867, 0.4123, 0.5436, 0.6739, 0.7978, 0.911, 1.0102, 1.0934, 1.1594, 1.2082, 1.2403, 1.2569, 1.2599, 1.2511, 1.2328, 1.2074, 1.177, 1.1437, 1.1095, 1.0759, 1.0443, 1.0157, 0.991, 0.9705, 0.9546, 0.9431, 0.9359, 0.9326, 0.9327, 0.9357, 0.941, 0.9481, 0.9562, 0.965, 0.9739, 0.9826, 0.9906, 0.9978, 1.0039, 1.0089, 1.0128, 1.0154, 1.017, 1.0176, 1.0174, 1.0164, 1.0149, 1.013, 1.0108, 1.0085, 1.0062, 1.0039, 1.0019, 1.0001, 0.9986, 0.9974, 0.9965, 0.9958, 0.9955, 0.9954, 0.9955, 0.9958, 0.9963, 0.9968, 0.9974, 0.998, 0.9986, 0.9991, 0.9996, 1.0001, 1.0005, 1.0008, 1.001, 1.0011, 1.0012, 1.0012, 1.0011, 1.0011, 1.0009, 1.0008, 1.0006, 1.0005, 1.0003, 1.0002, 1.0001, 0.9999, 0.9999, 0.9998, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9998, 0.9998, 1);
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .fab {
        --item-radius: 96px;

        position: relative;
        width: 180px;
        height: 180px;
        border: 0;

        &::details-content {
          content-visibility: visible;
        }

        .fab-main,
        .fab-item {
          position: absolute;
          right: 0;
          bottom: 0;
          border: 1px solid var(--color-line);
          border-radius: 50%;
          background: var(--color-surface);
          cursor: pointer;
        }

        .fab-main {
          width: 64px;
          height: 64px;
          display: grid;
          place-items: center;
          list-style: none;
          transition: border-color 0.2s;

          &::-webkit-details-marker {
            display: none;
          }

          &:focus-visible {
            border-color: var(--color-accent);
            outline: none;
          }

          @media (any-hover: hover) {
            &:hover {
              border-color: var(--color-accent);
            }
          }
        }

        .fab-item {
          --item-angle: 0deg;

          width: 56px;
          height: 56px;
          display: grid;
          place-items: center;
          text-decoration: none;
          color: var(--color-text);
          opacity: 0;
          pointer-events: none;
          scale: 0.2;
          translate: 0 0;
          transition:
            color 0.2s,
            border-color 0.2s,
            opacity 0.2s,
            scale 0.8s var(--spring-bouncy),
            translate 0.8s var(--spring-bouncy);

          &:focus-visible {
            border-color: var(--color-accent);
            color: var(--color-accent);
            outline: none;
          }

          @media (any-hover: hover) {
            &:hover {
              border-color: var(--color-accent);
              color: var(--color-accent);
            }
          }
        }

        .fab-item:nth-of-type(2) {
          --item-angle: 45deg;
        }

        .fab-item:nth-of-type(3) {
          --item-angle: 90deg;
        }

        .fab-main-icon {
          position: relative;
          width: 20px;
          height: 20px;
          transition: rotate 1s var(--spring-bouncy);

          &::before,
          &::after {
            content: "";
            position: absolute;
            top: calc(50% - 1px);
            left: 0;
            width: 20px;
            height: 2px;
            background: var(--color-accent);
          }

          &::after {
            rotate: 90deg;
          }
        }

        &[open] {
          .fab-main-icon {
            rotate: 135deg;
          }

          .fab-item {
            opacity: 1;
            pointer-events: auto;
            scale: 1;
            translate: calc(sin(var(--item-angle)) * var(--item-radius) * -1)
              calc(cos(var(--item-angle)) * var(--item-radius) * -1);
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <details class="fab">
          <summary class="fab-main">
            <span class="fab-main-icon"></span>
          </summary>
          <a class="fab-item" href="#">A</a>
          <a class="fab-item" href="#">B</a>
          <a class="fab-item" href="#">C</a>
        </details>
      </div>
    </main>
  </body>
</html>
