<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .compare {
        max-width: 640px;
      }

      .compare-lanes {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .lane {
        --surface-radius: 16px;

        display: grid;
        gap: 12px;
        padding: 12px;
        container-type: inline-size;
        justify-items: center;

        .lane-label {
          margin: 0;
          font-size: 0.84rem;
          font-weight: 600;
          letter-spacing: -0.01em;
          text-align: center;
        }

        .lane-body {
          display: grid;
          grid-template-columns: max-content;
          gap: 12px;
          justify-content: center;
          place-items: start center;
        }

        .lane-curve {
          inline-size: 168px;
          block-size: 168px;
          display: block;
          border-radius: 12px;

          .lane-curve-guide,
          .lane-curve-line {
            fill: none;
            stroke: var(--color-axis-line);
            stroke-linecap: round;
            stroke-linejoin: round;
          }

          .lane-curve-guide {
            stroke-width: 1;
          }

          .lane-curve-line {
            stroke-width: 1.75;
          }
        }

        .lane-track {
          --track-start-inset: 16px;
          --track-end-inset: 44px;

          width: 72px;
          height: 140px;

          &::before {
            content: "";
            position: absolute;
            inset: var(--track-start-inset) auto var(--track-end-inset) calc(50% - 1px);
            width: 2px;
            height: auto;
            background: var(--color-axis-line);
          }
        }

        .lane-panel {
          display: grid;
          gap: 8px;
          min-width: 0;
          justify-items: center;
        }

        .lane-scale-stage {
          width: 112px;
          aspect-ratio: 1;

          &::before {
            content: "";
            position: absolute;
            top: calc(50% - 32px);
            left: calc(50% - 32px);
            box-sizing: border-box;
            width: 64px;
            height: 64px;
            border: 2px solid var(--color-axis-line);
            border-radius: 999px;
          }
        }

        .lane-track,
        .lane-scale-stage {
          position: relative;
          border: 1px solid var(--color-line);
          border-radius: 20px;
          background: var(--color-surface);
          overflow: clip;
        }

        .lane-block {
          position: absolute;
          top: var(--track-start-inset, 20px);
          left: calc(50% - 16px);
          width: 32px;
          height: 32px;
          border-radius: 999px;
          background: var(--color-text);
          translate: 0 0;

          &[data-motion="scale"] {
            --block-scale: 0.4;

            top: calc(50% - 32px);
            left: calc(50% - 32px);
            width: 64px;
            height: 64px;
            border-radius: 999px;
            transform: scale(var(--block-scale));
            transform-origin: center;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="compare demo-compare">
          <button class="button demo-replay" data-replay>
            <span class="replay-icon"></span>
            <span>Replay</span>
          </button>

          <div class="compare-lanes" data-lanes></div>
        </div>
      </div>
    </main>

    <script type="module">
      import { animate, eases, spring } from "https://cdn.jsdelivr.net/npm/animejs/+esm";

      const DURATION = 1200;
      const CURVE = {
        inset: 18,
        size: 84,
        min: 0,
        max: 1.2,
        samples: 60,
      };
      const modes = [
        { key: "elastic", label: "Elastic", ease: resolveEase(eases.outElastic()) },
        { key: "spring", label: "Spring", ease: resolveEase(spring({ duration: DURATION })) },
      ];

      const lanesRoot = document.querySelector("[data-lanes]");
      const replayButton = document.querySelector("[data-replay]");
      const animations = Object.fromEntries(modes.map(({ key, ease }) => [key, { duration: DURATION, ease }]));

      lanesRoot.innerHTML = modes.map(renderLane).join("");

      const blocks = Array.from(lanesRoot.querySelectorAll("[data-block]"));

      let activeAnimations = [];

      function renderLane({ key, label }) {
        return `
          <div class="lane surface-card">
            <p class="lane-label">${label}</p>
            <div class="lane-body">
              <div class="lane-panel" data-panel="curve">
                <!-- 📈 -->
                <svg class="lane-curve" viewBox="0 0 120 120">
                  <path class="lane-curve-guide"></path>
                  <path class="lane-curve-line" data-curve="${key}"></path>
                </svg>
              </div>
              <div class="lane-panel" data-panel="scale">
                <div class="lane-scale-stage">
                  <div class="lane-block" data-block data-kind="${key}" data-motion="scale"></div>
                </div>
              </div>
              <div class="lane-panel" data-panel="y">
                <div class="lane-track" data-track>
                  <div class="lane-block" data-block data-kind="${key}" data-motion="y"></div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function resetBlock(block) {
        block.style.translate = "0 0";
        if (block.dataset.motion === "scale") {
          block.style.setProperty("--block-scale", "0");
          return;
        }

        block.style.removeProperty("transform");
      }

      /** Returns the available Y travel inside one track. */
      function getTravelY(block) {
        const track = block.closest("[data-track]");
        const styles = getComputedStyle(track);
        const startInset = Number.parseFloat(styles.getPropertyValue("--track-start-inset")) || 28;
        const endInset = Number.parseFloat(styles.getPropertyValue("--track-end-inset")) || 28;
        return track.clientHeight - block.offsetHeight - startInset - endInset;
      }

      function resolveEase(ease) {
        return typeof ease === "function" ? ease : (ease?.ease ?? ((time) => time));
      }

      function getCurvePoint(time, value) {
        return {
          x: CURVE.inset + CURVE.size * time,
          y: CURVE.inset + CURVE.size - ((value - CURVE.min) / (CURVE.max - CURVE.min)) * CURVE.size,
        };
      }

      function drawCurve(path, ease) {
        const commands = Array.from({ length: CURVE.samples + 1 }, (_, index) => {
          const time = index / CURVE.samples;
          const value = time === 0 ? 0 : time === 1 ? 1 : ease(time);
          const point = getCurvePoint(time, value);
          return `${index === 0 ? "M" : "L"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`;
        });

        path.setAttribute("d", commands.join(" "));
      }

      function drawCurveGuide(path) {
        const origin = getCurvePoint(0, 0);
        path.setAttribute(
          "d",
          `M${CURVE.inset} ${CURVE.inset}V${origin.y.toFixed(2)}H${(CURVE.inset + CURVE.size).toFixed(2)}`,
        );
      }

      function playBlock(block) {
        const animation = animations[block.dataset.kind];

        if (block.dataset.motion === "y") {
          return animate(block, {
            ...animation,
            y: getTravelY(block),
          });
        }

        return animate(block, {
          ...animation,
          "--block-scale": "1",
        });
      }

      function replay() {
        activeAnimations.forEach((animation) => animation.pause?.());
        activeAnimations = [];
        blocks.forEach(resetBlock);

        requestAnimationFrame(() => {
          activeAnimations = blocks.map(playBlock);
        });
      }

      lanesRoot.querySelectorAll(".lane-curve-guide").forEach(drawCurveGuide);
      modes.forEach(({ key, ease }) => {
        drawCurve(lanesRoot.querySelector(`[data-curve="${key}"]`), ease);
      });
      replayButton.addEventListener("click", replay);
      replay();
    </script>
  </body>
</html>
