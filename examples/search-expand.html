<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .search {
        position: relative;
        width: 56px;
        min-height: 56px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: clip;
        transition:
          width 0.82s var(--spring-anchor),
          border-color 0.2s;
      }

      .search__icon {
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 20px;
        display: grid;
        place-items: center;
        translate: 0 0;
        transition:
          scale 0.82s var(--spring-anchor),
          translate 0.82s var(--spring-anchor);
      }

      .search__input {
        flex: 1;
        max-width: 0;
        min-width: 0;
        padding: 0;
        border: 0;
        outline: 0;
        background: transparent;
        opacity: 0;
        pointer-events: none;
        transition:
          max-width 0.7s var(--spring-anchor),
          padding-inline 0.7s var(--spring-anchor),
          opacity 0.16s linear 0.08s;

        &::-webkit-search-cancel-button,
        &::-webkit-search-decoration {
          appearance: none;
          display: none;
        }
      }

      .search[data-state="open"],
      .search[data-state="closing"] {
        justify-content: flex-start;
      }

      .search[data-state="open"] {
        width: min(420px, calc(100vw - 32px));
        border-color: var(--accent);
      }

      .search[data-state="open"] .search__icon {
        scale: 1.06;
        translate: 1px 0;
      }

      .search[data-state="open"] .search__input {
        max-width: 320px;
        opacity: 1;
        padding-inline: 12px;
        pointer-events: auto;
        transition-delay: 0.1s;
      }

      .search[data-state="closing"] {
        transition:
          width 0.26s ease,
          border-color 0.18s linear 0.16s;
      }

      .search[data-state="closing"] .search__icon {
        scale: 1;
        translate: 0 0;
        transition:
          scale 0.22s ease,
          translate 0.22s ease;
      }

      .search[data-state="closing"] .search__input {
        max-width: 0;
        opacity: 0;
        padding-inline: 0;
        pointer-events: none;
        transition:
          max-width 0.18s ease,
          padding-inline 0.18s ease,
          opacity 0.1s linear;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <label class="search">
          <span class="search__icon">Q</span>
          <input class="search__input" type="search" placeholder="Search projects" />
        </label>
      </section>
    </main>
    <script type="module">
      const search = document.querySelector(".search");
      const input = search.querySelector(".search__input");
      let closeTimer = 0;

      search.addEventListener("focusin", () => {
        clearTimeout(closeTimer);
        search.dataset.state = "open";
      });

      search.addEventListener("focusout", (event) => {
        if (search.contains(event.relatedTarget)) return;
        search.dataset.state = "closing";
        closeTimer = window.setTimeout(() => {
          if (search.matches(":focus-within")) return;
          delete search.dataset.state;
        }, 360);
      });
    </script>
  </body>
</html>
