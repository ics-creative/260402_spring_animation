<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .popover {
        position: fixed;
        inset: auto;
        margin: 0;
        width: min(220px, calc(100vw - 32px));
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        display: grid;
        gap: 4px;
        position-anchor: var(--current-anchor);
        position-area: bottom center;
        margin-block-start: 12px;
        position-try-fallbacks:
          flip-block,
          flip-inline,
          flip-block flip-inline;
        transform-origin: center top;
        opacity: 0;
        translate: 0 -24px;
        scale: 0.82;
        transition:
          opacity 0.24s linear,
          inset 0.32s ease,
          margin 0.32s ease,
          translate 0.82s var(--spring-anchor),
          scale 0.82s var(--spring-anchor),
          display 0.24s allow-discrete,
          overlay 0.24s allow-discrete;

        &:popover-open {
          opacity: 1;
          translate: 0 0;
          scale: 1;

          @starting-style {
            opacity: 0;
            translate: 0 -24px;
            scale: 0.82;
          }
        }
      }

      .popover__menu {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 1px;
      }

      .popover__item {
        min-width: 0;
      }

      .popover__action {
        width: 100%;
        min-height: 40px;
        padding: 0 12px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        color: var(--text);
        transition:
          background-color 0.16s,
          color 0.16s;

        &:hover {
          background: color-mix(in srgb, var(--surface) 94%, var(--text) 6%);
        }

        &:active {
          scale: 1;
        }
      }

      .popover__label,
      .popover__meta {
        display: block;
        margin: 0;
      }

      .popover__label {
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: -0.01em;
      }

      .popover__meta {
        font-size: 0.75rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="row">
          <button class="button action" commandfor="popover-1" command="toggle-popover" style="anchor-name: --action-1">
            Share
          </button>
          <button class="button action" commandfor="popover-2" command="toggle-popover" style="anchor-name: --action-2">
            Invite
          </button>
          <button class="button action" commandfor="popover-3" command="toggle-popover" style="anchor-name: --action-3">
            Move
          </button>
        </div>
      </section>
      <div class="popover" id="popover-1" popover style="--current-anchor: --action-1">
        <ul class="popover__menu">
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Copy link</span>
              <span class="popover__meta">Cmd+C</span>
            </button>
          </li>
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Send by email</span>
              <span class="popover__meta">Open</span>
            </button>
          </li>
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Manage access</span>
              <span class="popover__meta">More</span>
            </button>
          </li>
        </ul>
      </div>
      <div class="popover" id="popover-2" popover style="--current-anchor: --action-2">
        <ul class="popover__menu">
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Add reviewer</span>
              <span class="popover__meta">Add</span>
            </button>
          </li>
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Copy invite</span>
              <span class="popover__meta">Cmd+C</span>
            </button>
          </li>
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">View guests</span>
              <span class="popover__meta">Open</span>
            </button>
          </li>
        </ul>
      </div>
      <div class="popover" id="popover-3" popover style="--current-anchor: --action-3">
        <ul class="popover__menu">
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Move to next</span>
              <span class="popover__meta">Next</span>
            </button>
          </li>
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Send to backlog</span>
              <span class="popover__meta">Backlog</span>
            </button>
          </li>
          <li class="popover__item">
            <button class="popover__action" type="button">
              <span class="popover__label">Archive task</span>
              <span class="popover__meta">Archive</span>
            </button>
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
