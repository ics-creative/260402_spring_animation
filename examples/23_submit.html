<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      :root {
        /* anime.js spring default: https://animejs.com/easing-editor/spring/default */

        /* prettier-ignore */
        --spring-default: linear(0, 0.0107, 0.0398, 0.0834, 0.138, 0.2003, 0.2677, 0.3379, 0.4089, 0.4791, 0.5471, 0.612, 0.6731, 0.7297, 0.7815, 0.8283, 0.87, 0.9068, 0.9388, 0.9662, 0.9892, 1.0083, 1.0237, 1.0357, 1.0449, 1.0514, 1.0556, 1.058, 1.0587, 1.0581, 1.0563, 1.0538, 1.0506, 1.0469, 1.043, 1.0388, 1.0347, 1.0306, 1.0266, 1.0228, 1.0192, 1.0159, 1.0128, 1.0101, 1.0076, 1.0055, 1.0036, 1.002, 1.0006, 0.9995, 0.9986, 0.9979, 0.9974, 0.997, 0.9967, 0.9966, 0.9966, 0.9966, 0.9967, 0.9968, 0.997, 0.9972, 0.9975, 0.9977, 0.998, 0.9982, 0.9984, 0.9987, 0.9989, 0.9991, 0.9992, 0.9994, 0.9996, 0.9997, 0.9998, 0.9999, 1, 1, 1.0001, 1.0001, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1, 1, 1);

        /* anime.js spring bouncy: https://animejs.com/easing-editor/spring/bouncy */

        /* prettier-ignore */
        --spring-bouncy: linear(0, 0.0222, 0.0833, 0.1743, 0.2867, 0.4123, 0.5436, 0.6739, 0.7978, 0.911, 1.0102, 1.0934, 1.1594, 1.2082, 1.2403, 1.2569, 1.2599, 1.2511, 1.2328, 1.2074, 1.177, 1.1437, 1.1095, 1.0759, 1.0443, 1.0157, 0.991, 0.9705, 0.9546, 0.9431, 0.9359, 0.9326, 0.9327, 0.9357, 0.941, 0.9481, 0.9562, 0.965, 0.9739, 0.9826, 0.9906, 0.9978, 1.0039, 1.0089, 1.0128, 1.0154, 1.017, 1.0176, 1.0174, 1.0164, 1.0149, 1.013, 1.0108, 1.0085, 1.0062, 1.0039, 1.0019, 1.0001, 0.9986, 0.9974, 0.9965, 0.9958, 0.9955, 0.9954, 0.9955, 0.9958, 0.9963, 0.9968, 0.9974, 0.998, 0.9986, 0.9991, 0.9996, 1.0001, 1.0005, 1.0008, 1.001, 1.0011, 1.0012, 1.0012, 1.0011, 1.0011, 1.0009, 1.0008, 1.0006, 1.0005, 1.0003, 1.0002, 1.0001, 0.9999, 0.9999, 0.9998, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9998, 0.9998, 1);

        /* anime.js spring strong: https://animejs.com/easing-editor/spring/strong */

        /* prettier-ignore */
        --spring-strong: linear(0, 0.0296, 0.1105, 0.2304, 0.3763, 0.5358, 0.6978, 0.8525, 0.9921, 1.1108, 1.2051, 1.2732, 1.3152, 1.3326, 1.3282, 1.3056, 1.2689, 1.2222, 1.1699, 1.1158, 1.0632, 1.015, 0.9733, 0.9395, 0.9144, 0.898, 0.8899, 0.8895, 0.8955, 0.9065, 0.9213, 0.9384, 0.9564, 0.9741, 0.9907, 1.0052, 1.0173, 1.0265, 1.0328, 1.0362, 1.037, 1.0356, 1.0323, 1.0277, 1.0222, 1.0162, 1.0103, 1.0046, 0.9995, 0.9953, 0.9919, 0.9896, 0.9882, 0.9876, 0.9879, 0.9889, 0.9903, 0.9921, 0.994, 0.996, 0.998, 0.9997, 1.0012, 1.0024, 1.0033, 1.0039, 1.0041, 1.0041, 1.0038, 1.0034, 1.0028, 1.0022, 1.0015, 1.0009, 1.0003, 0.9997, 0.9993, 0.999, 0.9988, 0.9986, 0.9986, 0.9987, 0.9988, 0.999, 0.9992, 0.9994, 0.9997, 0.9999, 1, 1.0002, 1.0003, 1.0004, 1.0004, 1.0005, 1.0004, 1.0004, 1.0004, 1.0003, 1.0002, 1.0001, 1);
      }

      .stage {
        align-content: center;
        justify-items: center;
      }

      .submit {
        position: relative;
        width: min(256px, calc(100vw - 32px));
        height: 64px;
        min-height: 56px;
        padding: 0;
        border: 1px solid var(--color-line);
        border-radius: 12px;
        background: var(--color-surface);
        color: var(--color-text);
        cursor: pointer;
        display: inline flex;
        align-items: center;
        justify-content: center;
        overflow: clip;
        transition:
          width 1s var(--spring-default),
          border-radius 1s var(--spring-bouncy),
          scale 1s var(--spring-bouncy),
          background-color 0.2s,
          color 0.2s,
          border-color 0.2s;

        @media (any-hover: hover) {
          &[data-state="idle"]:hover {
            color: var(--color-accent);
            border-color: var(--color-accent);
          }
        }

        .submit-label,
        .submit-icon,
        .submit-spinner {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
          transition:
            opacity 0.2s,
            scale 0.5s var(--spring-strong),
            translate 0.5s var(--spring-strong);
        }

        .submit-icon,
        .submit-spinner {
          color: inherit;
          opacity: 0;
          scale: 0.55;
        }

        .submit-icon {
          svg {
            width: 22px;
            height: 22px;
            scale: 0.82;
            stroke: currentcolor;
            stroke-width: 2.75;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            transform-box: fill-box;
            transform-origin: center;
            transition: scale 0.3s var(--spring-default);
          }

          path {
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            transition: stroke-dashoffset 0.4s ease-out 0.1s;
          }
        }

        .submit-spinner-ring {
          width: 22px;
          height: 22px;
          border: 2px solid currentcolor;
          border-right-color: transparent;
          border-radius: 50%;
          transform: rotate(-90deg);
        }

        /* Loading and done share the same circle so the morph reads as one shape, not a jump cut. */
        &[data-state="loading"],
        &[data-state="done"] {
          width: 64px;
          height: 64px;
          border-radius: 32px;
          cursor: default;

          @media (any-hover: hover) {
            &:hover {
              transform: none;
              color: inherit;
              border-color: inherit;
            }
          }
        }

        &[data-state="loading"] {
          scale: 1;
          translate: 0 0;

          .submit-label {
            opacity: 0;
            scale: 0.45;
            translate: 0 -10px;
          }

          .submit-spinner {
            opacity: 1;
            scale: 1;
          }

          .submit-spinner-ring {
            animation: submit-spinner-rotate 0.7s linear infinite;
          }
        }

        &[data-state="done"] {
          background: var(--color-accent);
          border-color: var(--color-accent);
          color: var(--color-accent-contrast);
          scale: 1;
          translate: 0 0;

          .submit-label,
          .submit-spinner {
            opacity: 0;
            scale: 0.42;
            translate: 0 10px;
          }

          .submit-icon {
            opacity: 1;
            scale: 1;
            translate: 0 0;

            svg {
              scale: 2;
            }

            path {
              stroke-dashoffset: 0;
            }
          }
        }

        &:disabled {
          pointer-events: none;
        }
      }

      @keyframes submit-spinner-rotate {
        to {
          transform: rotate(270deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <button class="submit" data-submit data-state="idle">
          <span class="submit-label">Submit</span>
          <span class="submit-spinner"><span class="submit-spinner-ring"></span></span>
          <span class="submit-icon">
            <!-- ✓ -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12.5l4.2 4.2L19 7.4"></path>
            </svg>
          </span>
        </button>
      </div>
    </main>
    <script>
      const button = document.querySelector("[data-submit]");

      /**
       * Switches the demo button between idle, loading, and done states.
       *
       * @param {"idle" | "loading" | "done"} state
       */
      function setState(state) {
        button.dataset.state = state;
        button.disabled = state !== "idle";
      }

      function handleSubmitClick() {
        if (button.dataset.state !== "idle") return;
        setState("loading");
        setTimeout(() => {
          setState("done");
        }, 1050);
        setTimeout(() => {
          setState("idle");
        }, 2200);
      }

      button.addEventListener("click", handleSubmitClick);
    </script>
  </body>
</html>
