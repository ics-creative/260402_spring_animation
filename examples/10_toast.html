<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        position: relative;
        min-height: 100dvh;
        justify-items: center;
        align-content: end;
      }

      .stack {
        position: absolute;
        top: 24px;
        left: 50%;
        width: min(320px, calc(100% - 32px));
        display: grid;
        gap: 10px;
        translate: -50% 0;
      }

      .toast {
        position: relative;
        width: 100%;
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        align-items: center;
        column-gap: 10px;
        padding: 11px 12px;
        border: 1px solid var(--color-line);
        border-radius: 12px;
        background: var(--color-surface);
        opacity: 1;
        translate: 0 0;
        scale: 1;
        transform-origin: top center;
        overflow: clip;
        transition:
          opacity 1.1s var(--spring-bouncy),
          translate 1.1s var(--spring-bouncy),
          scale 1.1s var(--spring-bouncy),
          display 0.3s allow-discrete;

        @starting-style {
          opacity: 0;
          translate: 0 -52px;
          scale: 0.82;
        }

        &[hidden] {
          transition:
            opacity 0.3s ease,
            translate 0.3s ease,
            scale 0.3s ease,
            display 0.3s allow-discrete;
          display: none;
          opacity: 0;
          translate: 0 -8px;
          scale: 0.96;
        }

        .toast-mark {
          width: 28px;
          height: 28px;
          border: 1px solid var(--color-surface-muted);
          border-radius: 9px;
          display: grid;
          place-items: center;
          font-size: 0.74rem;
          font-weight: 700;
          color: var(--color-text);
          background: var(--color-surface-muted);
        }

        .toast-copy {
          min-width: 0;
        }

        .toast-title {
          margin: 0;
          font-size: 0.9rem;
          font-weight: 600;
          letter-spacing: -0.01em;
          line-height: 1.2;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="stack" data-stack role="region" aria-label="Notifications"></div>
        <div class="row controls">
          <button class="button" data-add>Add toast</button>
        </div>
      </div>
    </main>
    <script type="module">
      let count = 0;
      const stack = document.querySelector("[data-stack]");
      let activeToast = null;
      let activeTimer = 0;
      /**
       * @typedef {object} ToastMessage
       * @property {string} mark
       * @property {string} title
       */

      /** @type {ToastMessage[]} */
      const messages = [
        {
          mark: "W",
          title: "Draft saved",
        },
        {
          mark: "P",
          title: "Preview ready",
        },
        {
          mark: "R",
          title: "Reply sent",
        },
      ];

      /**
       * Starts the toast exit transition and optionally chains the next toast once removal finishes.
       *
       * @param {HTMLElement} toast
       * @param {() => void} [onFinish]
       */
      function animateExit(toast, onFinish) {
        // Keep the real toast in the DOM so the discrete display transition can finish cleanly.
        const handleTransitionEnd = (event) => {
          if (event.propertyName !== "opacity") return;
          toast.removeEventListener("transitionend", handleTransitionEnd);
          toast.remove();
          onFinish?.();
        };

        toast.addEventListener("transitionend", handleTransitionEnd);
        toast.hidden = true;
      }

      /**
       * Builds the DOM node for a single toast message from the demo data.
       *
       * @param {ToastMessage} item
       * @returns {HTMLElement}
       */
      function buildToast(item) {
        const toast = document.createElement("article");
        toast.className = "toast";
        toast.innerHTML = `
          <span class="toast-mark">${item.mark}</span>
          <div class="toast-copy">
            <p class="toast-title">${item.title}</p>
          </div>
        `;
        return toast;
      }

      function handleAddClick() {
        count += 1;
        const item = messages[(count - 1) % messages.length];
        const toast = buildToast(item);

        const showNext = () => {
          stack.replaceChildren(toast);
          activeToast = toast;
          activeTimer = window.setTimeout(() => {
            if (toast !== activeToast) return;
            activeToast = null;
            animateExit(toast);
          }, 3400);
        };

        if (activeToast) {
          window.clearTimeout(activeTimer);
          const previous = activeToast;
          activeToast = null;
          animateExit(previous, showNext);
          return;
        }

        showNext();
      }

      document.querySelector("[data-add]").addEventListener("click", handleAddClick);
    </script>
  </body>
</html>
