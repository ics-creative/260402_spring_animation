<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      :root {
        /* anime.js spring bouncy: https://animejs.com/easing-editor/spring/bouncy */

        /* prettier-ignore */
        --spring-bouncy: linear(0, 0.0222, 0.0833, 0.1743, 0.2867, 0.4123, 0.5436, 0.6739, 0.7978, 0.911, 1.0102, 1.0934, 1.1594, 1.2082, 1.2403, 1.2569, 1.2599, 1.2511, 1.2328, 1.2074, 1.177, 1.1437, 1.1095, 1.0759, 1.0443, 1.0157, 0.991, 0.9705, 0.9546, 0.9431, 0.9359, 0.9326, 0.9327, 0.9357, 0.941, 0.9481, 0.9562, 0.965, 0.9739, 0.9826, 0.9906, 0.9978, 1.0039, 1.0089, 1.0128, 1.0154, 1.017, 1.0176, 1.0174, 1.0164, 1.0149, 1.013, 1.0108, 1.0085, 1.0062, 1.0039, 1.0019, 1.0001, 0.9986, 0.9974, 0.9965, 0.9958, 0.9955, 0.9954, 0.9955, 0.9958, 0.9963, 0.9968, 0.9974, 0.998, 0.9986, 0.9991, 0.9996, 1.0001, 1.0005, 1.0008, 1.001, 1.0011, 1.0012, 1.0012, 1.0011, 1.0011, 1.0009, 1.0008, 1.0006, 1.0005, 1.0003, 1.0002, 1.0001, 0.9999, 0.9999, 0.9998, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9997, 0.9998, 0.9998, 1);
      }

      .stage {
        position: relative;
        min-height: 100dvh;
        justify-items: center;
        align-content: end;
      }

      .stack {
        position: absolute;
        top: 24px;
        left: 50%;
        width: min(320px, calc(100% - 32px));
        display: grid;
        gap: 10px;
        translate: -50% 0;
      }

      .toast {
        position: relative;
        width: 100%;
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        align-items: center;
        column-gap: 10px;
        padding: 12px;
        border: 1px solid var(--color-line);
        border-radius: 12px;
        background: var(--color-surface);
        opacity: 1;
        translate: 0 0;
        scale: 1;
        transform-origin: top center;
        overflow: clip;
        transition:
          opacity 1.1s var(--spring-bouncy),
          translate 1.1s var(--spring-bouncy),
          scale 1.1s var(--spring-bouncy),
          display 0.3s allow-discrete;

        @starting-style {
          opacity: 0;
          translate: 0 -52px;
          scale: 0.82;
        }

        &[hidden] {
          transition:
            opacity 0.3s ease,
            translate 0.3s ease,
            scale 0.3s ease,
            display 0.3s allow-discrete;
          display: none;
          opacity: 0;
          translate: 0 -8px;
          scale: 0.96;
        }

        .toast-mark {
          width: 28px;
          height: 28px;
          border: 1px solid var(--color-surface-muted);
          border-radius: 9px;
          display: grid;
          place-items: center;
          font-size: 0.75rem;
          font-weight: bold;
          color: var(--color-text);
          background: var(--color-surface-muted);
        }

        .toast-copy {
          min-width: 0;
        }

        .toast-title {
          margin: 0;
          font-size: 0.875rem;
          font-weight: bold;
          line-height: 1.2;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="stack" data-stack role="region" aria-label="Notifications"></div>
        <div class="row controls">
          <button class="button" data-add>Add toast</button>
        </div>
      </div>
    </main>
    <script>
      let count = 0;
      const stack = document.querySelector("[data-stack]");
      let activeToast = null;
      let activeTimer = 0;
      /**
       * @typedef {object} ToastMessage
       * @property {string} mark
       * @property {string} title
       */

      /** @type {ToastMessage[]} */
      const messages = [
        {
          mark: "W",
          title: "Draft saved",
        },
        {
          mark: "P",
          title: "Preview ready",
        },
        {
          mark: "R",
          title: "Reply sent",
        },
      ];

      /**
       * Starts the toast exit transition and optionally chains the next toast once removal finishes.
       *
       * @param {HTMLElement} toast
       * @param {() => void} [onFinish]
       */
      function animateExit(toast, onFinish) {
        // Keep the real toast in the DOM so the discrete display transition can finish cleanly.
        const handleTransitionEnd = (event) => {
          if (event.propertyName !== "opacity") return;
          toast.removeEventListener("transitionend", handleTransitionEnd);
          toast.remove();
          onFinish?.();
        };

        toast.addEventListener("transitionend", handleTransitionEnd);
        toast.hidden = true;
      }

      /**
       * Builds the DOM node for a single toast message from the demo data.
       *
       * @param {ToastMessage} item
       * @returns {HTMLElement}
       */
      function buildToast(item) {
        const toast = document.createElement("article");
        toast.className = "toast";
        toast.innerHTML = `
          <span class="toast-mark">${item.mark}</span>
          <div class="toast-copy">
            <p class="toast-title">${item.title}</p>
          </div>
        `;
        return toast;
      }

      function handleAddClick() {
        count += 1;
        const item = messages[(count - 1) % messages.length];
        const toast = buildToast(item);

        const showNext = () => {
          stack.replaceChildren(toast);
          activeToast = toast;
          activeTimer = window.setTimeout(() => {
            if (toast !== activeToast) return;
            activeToast = null;
            animateExit(toast);
          }, 3400);
        };

        if (activeToast) {
          window.clearTimeout(activeTimer);
          const previous = activeToast;
          activeToast = null;
          animateExit(previous, showNext);
          return;
        }

        showNext();
      }

      document.querySelector("[data-add]").addEventListener("click", handleAddClick);
    </script>
  </body>
</html>
