<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      :root {
        /* anime.js outElastic: https://animejs.com/easing-editor/elastic/outelastic */

        /* prettier-ignore */
        --elastic-out: linear(0, 0.1935, 0.3985, 0.6042, 0.8012, 0.9816, 1.1396, 1.2707, 1.3727, 1.4446, 1.487, 1.5019, 1.4922, 1.4614, 1.4138, 1.3536, 1.2851, 1.2127, 1.1399, 1.0703, 1.0065, 0.9507, 0.9043, 0.8682, 0.8428, 0.8278, 0.8225, 0.826, 0.8369, 0.8537, 0.875, 0.8992, 0.9248, 0.9505, 0.9751, 0.9977, 1.0174, 1.0338, 1.0466, 1.0556, 1.0609, 1.0627, 1.0615, 1.0577, 1.0517, 1.0442, 1.0356, 1.0266, 1.0175, 1.0088, 1.0008, 0.9938, 0.988, 0.9835, 0.9804, 0.9785, 0.9778, 0.9782, 0.9796, 0.9817, 0.9844, 0.9874, 0.9906, 0.9938, 0.9969, 0.9997, 1.0022, 1.0042, 1.0058, 1.0069, 1.0076, 1.0078, 1.0077, 1.0072, 1.0065, 1.0055, 1.0045, 1.0033, 1.0022, 1.0011, 1.0001, 0.9992, 0.9985, 0.9979, 0.9975, 0.9973, 0.9972, 0.9973, 0.9975, 0.9977, 0.998, 0.9984, 0.9988, 0.9992, 0.9996, 1, 1.0003, 1.0005, 1.0007, 1.0009, 1);
      }

      .compare {
        max-width: 960px;

        .compare-grid {
          display: grid;
          gap: 16px;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
      }

      .motion-panel {
        --motion: 1.25s var(--spring-default);

        min-height: 320px;
        padding: 20px;
        border: 1px solid var(--color-line);
        border-radius: 24px;
        background: var(--color-surface);
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 16px;

        &[data-mode="elastic"] {
          --motion: 1.25s var(--elastic-out);
        }

        &[data-mode="spring"] {
          --motion: 1.25s var(--spring-strong);
        }

        .panel-label {
          margin: 0;
          font-size: 1rem;
          font-weight: 700;
        }

        .headline {
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 4rem;
          font-weight: 800;
          line-height: 0.84;
          text-align: center;
        }

        .glyph {
          display: inline flex;
          opacity: 0;
          translate: 0 84px;
          scale: 0.22;
          transition:
            opacity var(--motion),
            translate var(--motion),
            scale var(--motion);
          transition-delay: calc((sibling-index() - 1) * 0.06s);
        }

        &[data-state="active"] .glyph {
          opacity: 1;
          translate: 0 0;
          scale: 1;
        }

        @media (width >= 640px) {
          min-height: 420px;

          .headline {
            font-size: 6rem;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="compare demo-compare">
          <button class="button demo-replay" data-replay>
            <!-- 🔄 -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5V1L7 6l5 5V7a6 6 0 1 1-5.65 4H4.26A8 8 0 1 0 12 5" fill="currentColor" />
            </svg>
            <span>Replay</span>
          </button>

          <div class="compare-grid">
            <div class="motion-panel" data-mode="elastic" data-state="idle">
              <p class="panel-label">Elastic</p>

              <p class="headline" data-headline></p>
            </div>

            <div class="motion-panel" data-mode="spring" data-state="idle">
              <p class="panel-label">Spring</p>

              <p class="headline" data-headline></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const text = "REVEAL";
      const panels = Array.from(document.querySelectorAll(".motion-panel"));
      const replayButton = document.querySelector("[data-replay]");

      /**
       * Rebuilds one headline so each glyph starts from a fresh DOM node before the reveal animation runs.
       *
       * @param {HTMLElement} root
       */
      function buildHeadline(root) {
        root.replaceChildren();

        Array.from(text).forEach((character) => {
          const glyph = document.createElement("span");
          glyph.className = "glyph";
          glyph.textContent = character;
          root.append(glyph);
        });
      }

      /** Resets both panels to their initial state and then restarts the staggered glyph reveal. */
      function reveal() {
        panels.forEach((panel) => {
          panel.dataset.state = "idle";
          buildHeadline(panel.querySelector("[data-headline]"));
        });

        // Force a reflow so replayed glyphs start their transitions again.
        document.body.offsetWidth;

        panels.forEach((panel) => {
          panel.dataset.state = "active";
        });
      }

      replayButton.addEventListener("click", reveal);
      reveal();
    </script>
  </body>
</html>
