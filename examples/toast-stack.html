<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        position: relative;
        min-height: 420px;
        justify-items: center;
        align-content: end;
      }

      .stack {
        position: absolute;
        top: 24px;
        left: 50%;
        width: min(320px, calc(100% - 32px));
        display: grid;
        gap: 10px;
        translate: -50% 0;
      }

      .toast {
        position: relative;
        width: 100%;
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        align-items: center;
        column-gap: 10px;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        opacity: 1;
        translate: 0 0;
        scale: 1;
        transform-origin: top center;
        overflow: clip;
        transition:
          opacity 700ms var(--spring-anchor),
          translate 700ms var(--spring-anchor),
          scale 700ms var(--spring-anchor),
          display 700ms allow-discrete;
      }

      .toast[hidden] {
        display: none;
        opacity: 0;
        translate: 0 18px;
        scale: 0.86;
      }

      .toast__mark {
        width: 28px;
        height: 28px;
        border: 1px solid color-mix(in srgb, var(--line) 84%, var(--surface));
        border-radius: 9px;
        display: grid;
        place-items: center;
        font-size: 0.74rem;
        font-weight: 700;
        color: var(--text);
        background: color-mix(in srgb, var(--line) 18%, var(--surface));
      }

      .toast__copy {
        min-width: 0;
      }

      .toast__title {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="stack" data-stack role="region" aria-label="Notifications"></div>
        <div class="row controls">
          <button class="button" data-add>Add toast</button>
        </div>
      </section>
    </main>
    <script type="module">
      let count = 0;
      const stack = document.querySelector("[data-stack]");
      let activeToast = null;
      let activeTimer = 0;
      const messages = [
        {
          mark: "W",
          title: "Draft saved",
        },
        {
          mark: "P",
          title: "Preview ready",
        },
        {
          mark: "R",
          title: "Reply sent",
        },
      ];
      const easing =
        "linear(0, 0.1116, 0.216, 0.313, 0.4026, 0.485, 0.5602, 0.6286, 0.6904, 0.746, 0.7955, 0.8396, 0.8783, 0.9123, 0.9418, 0.9672, 0.9888, 1.0071, 1.0222, 1.0346, 1.0446, 1.0524, 1.0582, 1.0624, 1.0651, 1.0666, 1.067, 1.0665, 1.0653, 1.0635, 1.0611, 1.0584, 1.0555, 1.0523, 1.049, 1.0456, 1.0422, 1.0389, 1.0356, 1.0324, 1.0293, 1.0264, 1.0236, 1.021, 1.0186, 1.0163, 1.0142, 1.0122, 1.0105, 1.0089, 1.0074, 1.0061, 1.0049, 1.0039, 1.003, 1.0022, 1.0015, 1.0009, 1.0003, 0.9999, 0.9995, 0.9992, 0.999, 0.9988, 0.9987, 0.9986, 0.9985, 0.9984, 0.9985, 0.9985, 0.9985, 0.9986, 0.9986, 0.9987, 0.9988, 0.9989, 0.9989, 0.999, 0.9991, 0.9992, 0.9992, 0.9993, 0.9994, 0.9994, 0.9995, 0.9996, 0.9996, 0.9997, 0.9997, 0.9998, 0.9998, 0.9998, 0.9999, 0.9999, 0.9999, 0.9999, 0.9999, 1, 1, 1)";

      const animateExit = (toast, onFinish) => {
        const handleTransitionEnd = (event) => {
          if (event.propertyName !== "opacity") return;
          toast.removeEventListener("transitionend", handleTransitionEnd);
          toast.remove();
          onFinish?.();
        };

        toast.addEventListener("transitionend", handleTransitionEnd);
        toast.hidden = true;
      };

      const buildToast = (item) => {
        const toast = document.createElement("article");
        toast.className = "toast";
        toast.innerHTML = `
          <span class="toast__mark" aria-hidden="true">${item.mark}</span>
          <div class="toast__copy">
            <p class="toast__title">${item.title}</p>
          </div>
        `;
        return toast;
      };

      const animateEntry = (toast) => {
        toast.animate(
          [
            {
              opacity: 0,
              translate: "0 -52px",
              scale: "0.82",
            },
            {
              opacity: 1,
              translate: "0 12px",
              scale: "1.045",
              offset: 0.6,
            },
            {
              opacity: 1,
              translate: "0 0",
              scale: "1",
            },
          ],
          {
            duration: 1120,
            easing,
          },
        );
      };

      document.querySelector("[data-add]").addEventListener("click", () => {
        count += 1;
        const item = messages[(count - 1) % messages.length];
        const toast = buildToast(item);
        const showNext = () => {
          stack.replaceChildren(toast);
          activeToast = toast;
          animateEntry(toast);
          activeTimer = window.setTimeout(() => {
            if (toast !== activeToast) return;
            activeToast = null;
            animateExit(toast);
          }, 3400);
        };

        if (activeToast) {
          window.clearTimeout(activeTimer);
          const previous = activeToast;
          activeToast = null;
          animateExit(previous, showNext);
          return;
        }

        showNext();
      });
    </script>
  </body>
</html>
