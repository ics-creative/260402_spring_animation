<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      :root {
        /* anime.js spring default: https://animejs.com/easing-editor/spring/default */

        /* prettier-ignore */
        --spring-default: linear(0, 0.0107, 0.0398, 0.0834, 0.138, 0.2003, 0.2677, 0.3379, 0.4089, 0.4791, 0.5471, 0.612, 0.6731, 0.7297, 0.7815, 0.8283, 0.87, 0.9068, 0.9388, 0.9662, 0.9892, 1.0083, 1.0237, 1.0357, 1.0449, 1.0514, 1.0556, 1.058, 1.0587, 1.0581, 1.0563, 1.0538, 1.0506, 1.0469, 1.043, 1.0388, 1.0347, 1.0306, 1.0266, 1.0228, 1.0192, 1.0159, 1.0128, 1.0101, 1.0076, 1.0055, 1.0036, 1.002, 1.0006, 0.9995, 0.9986, 0.9979, 0.9974, 0.997, 0.9967, 0.9966, 0.9966, 0.9966, 0.9967, 0.9968, 0.997, 0.9972, 0.9975, 0.9977, 0.998, 0.9982, 0.9984, 0.9987, 0.9989, 0.9991, 0.9992, 0.9994, 0.9996, 0.9997, 0.9998, 0.9999, 1, 1, 1.0001, 1.0001, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0002, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1.0001, 1, 1, 1);
      }

      @property --active {
        syntax: "<number>";
        inherits: true;
        initial-value: 0;
      }

      html {
        overflow-y: scroll;
        scrollbar-gutter: stable;

        &::-webkit-scrollbar {
          width: 32px;
        }

        &::-webkit-scrollbar-track {
          background: #f5f5f5;
        }

        &::-webkit-scrollbar-thumb {
          background: #b8b8b8;
          border: 3px solid #f5f5f5;
          border-radius: 999px;
        }
      }

      .stage {
        min-height: auto;
        padding: 0;
        background: var(--color-surface);
        gap: 0;
        font-family: "Helvetica Neue", "Segoe UI", sans-serif;

        /* Keep the headline poster-heavy so each scroll stop reads instantly. */
        font-weight: 900;

        .story-list {
          width: 100%;
        }

        .story {
          min-height: 100vh;
          display: grid;
          align-items: center;

          .story-frame {
            min-height: auto;
            display: grid;
            place-items: center;
            padding: 24px;
          }
        }

        .headline {
          --active: 0;

          margin: 0;
          display: grid;
          justify-items: center;
          gap: 0.05em;
          font-size: clamp(3rem, 11vw, 8rem);
          line-height: 0.88;
          text-wrap: balance;
          timeline-trigger: --reveal view() contain 15% contain 85% / entry 100% exit 0%;
          trigger-scope: --reveal;
          animation: reveal-flag 1ms steps(1, end) both;
          animation-trigger: --reveal play-forwards play-backwards;

          .line {
            --offset: 0;

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.04em;
          }

          .letter {
            --index: calc(var(--offset) + sibling-index() - 1);

            display: inline-block;
            transition:
              translate 0.8s var(--spring-default),
              scale 0.8s var(--spring-default);
            translate: 0 calc((1 - var(--active)) * 0.6em);
            scale: var(--active);
            transition-delay: calc(var(--index) * 0.05s);
          }

          .glyph {
            display: inline-block;
          }
        }
      }

      /* Scroll triggers can currently start animations, so this 1ms bridge only flips the reveal flag. */
      @keyframes reveal-flag {
        to {
          --active: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="story-list">
          <div class="story">
            <div class="story-frame">
              <p class="headline">
                <span class="line">
                  <span class="letter"><span class="glyph">S</span></span>
                  <span class="letter"><span class="glyph">C</span></span>
                  <span class="letter"><span class="glyph">R</span></span>
                  <span class="letter"><span class="glyph">O</span></span>
                  <span class="letter"><span class="glyph">L</span></span>
                  <span class="letter"><span class="glyph">L</span></span>
                </span>
                <span class="line" style="

--offset: 6">
                  <span class="letter"><span class="glyph">D</span></span>
                  <span class="letter"><span class="glyph">O</span></span>
                  <span class="letter"><span class="glyph">W</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                </span>
              </p>
            </div>
          </div>

          <div class="story">
            <div class="story-frame">
              <p class="headline">
                <span class="line">
                  <span class="letter"><span class="glyph">S</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                  <span class="letter"><span class="glyph">A</span></span>
                  <span class="letter"><span class="glyph">P</span></span>
                </span>
                <span class="line" style="

--offset: 4">
                  <span class="letter"><span class="glyph">O</span></span>
                  <span class="letter"><span class="glyph">P</span></span>
                  <span class="letter"><span class="glyph">E</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                </span>
              </p>
            </div>
          </div>

          <div class="story">
            <div class="story-frame">
              <p class="headline">
                <span class="line">
                  <span class="letter"><span class="glyph">C</span></span>
                  <span class="letter"><span class="glyph">L</span></span>
                  <span class="letter"><span class="glyph">E</span></span>
                  <span class="letter"><span class="glyph">A</span></span>
                  <span class="letter"><span class="glyph">N</span></span>
                </span>
                <span class="line" style="

--offset: 5">
                  <span class="letter"><span class="glyph">E</span></span>
                  <span class="letter"><span class="glyph">X</span></span>
                  <span class="letter"><span class="glyph">I</span></span>
                  <span class="letter"><span class="glyph">T</span></span>
                </span>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
