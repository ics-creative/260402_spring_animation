<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .search {
        position: relative;
        width: 56px;
        min-height: 56px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: clip;
        transition:
          width 0.8s var(--spring-default),
          border-color 0.2s;

        .search-icon {
          width: 40px;
          height: 40px;
          display: grid;
          place-items: center;
          cursor: pointer;
          translate: 0 0;
          transition:
            translate 0.8s var(--spring-default),
            color 0.2s;

          svg {
            width: 22px;
            height: 22px;
            stroke: currentcolor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
          }
        }

        .search-input {
          flex: 1;
          max-width: 0;
          min-width: 0;
          padding: 0;
          border: 0;
          outline: 0;
          background: transparent;
          font-size: 1.05rem;
          line-height: 1.2;
          opacity: 0;
          pointer-events: none;
          transition:
            max-width 0.7s var(--spring-default),
            padding-inline 0.7s var(--spring-default),
            opacity 0.2s linear 0.1s;

          &::-webkit-search-cancel-button,
          &::-webkit-search-decoration {
            appearance: none;
            display: none;
          }
        }

        /* Only the shell springs. The field fades in after that so close does not look squashed. */
        &:has(.search-icon:hover) {
          border-color: var(--accent);
        }

        &:has(.search-input:focus) {
          justify-content: flex-start;
          width: min(420px, calc(100vw - 32px));
          border-color: var(--accent);

          .search-icon {
            translate: 1px 0;
          }

          .search-input {
            max-width: 320px;
            opacity: 1;
            padding-inline: 12px;
            pointer-events: auto;
            transition-delay: 0.1s;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <label class="search">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="6.5" />
              <path d="M16 16 L20 20" />
            </svg>
          </span>
          <input class="search-input" type="search" placeholder="Search projects" />
        </label>
      </section>
    </main>
  </body>
</html>
