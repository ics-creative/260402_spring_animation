<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .launcher-anchor-1 {
        anchor-name: --dialog-1;
      }

      .launcher-anchor-2 {
        anchor-name: --dialog-2;
      }

      .launcher-anchor-3 {
        anchor-name: --dialog-3;
      }

      .launcher-row {
        gap: 32px;
      }

      .dialog {
        margin: 0;
        padding: 0;
        border: 0;
        width: fit-content;
        max-width: none;
        overflow: visible;
        background: none;
        position: fixed;
        inset: auto;
        position-anchor: var(--dialog-anchor);
        left: anchor(center);
        top: anchor(center);
        translate: -50% -50%;
        opacity: 0;
        scale: 0.12;

        /* Anchor positioning gives the dialog a believable launch point before it settles at center. */
        transition:
          opacity 0.2s,
          scale 1.2s var(--spring-default),
          left 1.2s var(--spring-default),
          top 1.2s var(--spring-default),
          display 0.2s allow-discrete,
          overlay 0.2s allow-discrete;

        &[open] {
          left: 50%;
          top: 50%;
          opacity: 1;
          scale: 1;

          @starting-style {
            left: anchor(center);
            top: anchor(center);
            opacity: 0;
            scale: 0.12;
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 40%);
          opacity: 0;
          transition: opacity 0.2s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }
      }

      .dialog-inner {
        width: min(420px, calc(100vw - 24px));
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        display: grid;
        gap: 12px;

        h2,
        p {
          margin: 0;
        }
      }

      .dialog-anchor-1 {
        --dialog-anchor: --dialog-1;
      }

      .dialog-anchor-2 {
        --dialog-anchor: --dialog-2;
      }

      .dialog-anchor-3 {
        --dialog-anchor: --dialog-3;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="row launcher-row">
          <button class="button launcher launcher-anchor-1" commandfor="dialog-1" command="show-modal">Profile</button>
          <button class="button launcher launcher-anchor-2" commandfor="dialog-2" command="show-modal">Billing</button>
          <button class="button launcher launcher-anchor-3" commandfor="dialog-3" command="show-modal">Review</button>
        </div>
      </section>
      <dialog class="dialog dialog-anchor-1" id="dialog-1" closedby="any">
        <div class="dialog-inner">
          <h2>Profile updated</h2>
          <p>This panel grows from the pressed button, then settles at center.</p>
          <div class="row">
            <button class="button" commandfor="dialog-1" command="close">Close</button>
          </div>
        </div>
      </dialog>
      <dialog class="dialog dialog-anchor-2" id="dialog-2" closedby="any">
        <div class="dialog-inner">
          <h2>Invoice sent</h2>
          <p>This panel grows from the pressed button, then settles at center.</p>
          <div class="row">
            <button class="button" commandfor="dialog-2" command="close">Close</button>
          </div>
        </div>
      </dialog>
      <dialog class="dialog dialog-anchor-3" id="dialog-3" closedby="any">
        <div class="dialog-inner">
          <h2>Review requested</h2>
          <p>This panel grows from the pressed button, then settles at center.</p>
          <div class="row">
            <button class="button" commandfor="dialog-3" command="close">Close</button>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
