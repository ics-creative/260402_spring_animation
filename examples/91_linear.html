<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .compare {
        max-width: 860px;
      }

      .demo-title {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        letter-spacing: -0.03em;
      }

      .panel {
        --surface-radius: 18px;

        min-width: 0;
        padding: 18px;

        .token-label {
          margin: 0 0 10px;
          font-size: 0.82rem;
          font-weight: 600;
          letter-spacing: 0.02em;
          text-transform: uppercase;
          color: var(--color-muted);
        }

        .token {
          margin: 0;
          max-width: 100%;
          padding: 14px 16px;
          border-radius: 14px;
          background: #f7f7f7;
          font-family: SFMono-Regular, ui-monospace, monospace;
          font-size: 0.92rem;
          line-height: 1.6;
          overflow-x: auto;
        }
      }

      .graph {
        inline-size: min(100%, 680px);
        aspect-ratio: 1;
        display: block;
        justify-self: center;
        border: 1px solid var(--color-line);
        border-radius: 18px;
        background: var(--color-surface);

        .graph-grid,
        .graph-axis,
        .graph-reference,
        .graph-line {
          fill: none;
          stroke-linecap: round;
          stroke-linejoin: round;
        }

        .graph-grid {
          stroke: var(--color-axis-line);
          stroke-width: 1;
        }

        .graph-axis {
          stroke: var(--color-axis-line);
          stroke-width: 1.2;
        }

        .graph-reference {
          stroke: var(--color-axis-line);
          stroke-width: 1.4;
          stroke-dasharray: 5 6;
        }

        .graph-line {
          stroke: var(--color-accent);
          stroke-width: 3;
        }

        .graph-stop {
          fill: var(--color-surface);
          stroke: var(--color-accent);
          stroke-width: 2;
        }

        .graph-cursor {
          fill: var(--color-text);
          stroke: var(--color-surface);
          stroke-width: 3;
        }

        .graph-label {
          fill: var(--color-muted);
          font-family: sans-serif;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="compare demo-compare">
          <button class="button demo-replay" data-replay>
            <!-- 🔄 -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5V1L7 6l5 5V7a6 6 0 1 1-5.65 4H4.26A8 8 0 1 0 12 5" fill="currentColor" />
            </svg>
            <span>Replay</span>
          </button>

          <h1 class="demo-title">`linear()`</h1>

          <div class="panel surface-card">
            <p class="token-label">サンプル</p>
            <pre class="token"><code data-token></code></pre>
          </div>

          <div class="panel surface-card demo-visual">
            <div class="graph-panel demo-graph-panel">
              <!-- 📈 -->
              <svg class="graph" viewBox="0 0 240 240" aria-hidden="true">
                <path class="graph-grid" data-grid></path>
                <path class="graph-axis" d="M24 24V216H216"></path>
                <path class="graph-reference" data-reference></path>
                <path class="graph-grid" data-goal></path>
                <path class="graph-line" data-curve></path>
                <g data-stops></g>
                <circle class="graph-cursor" data-cursor cx="24" cy="216" r="5"></circle>
                <text class="graph-label" x="18" y="222">0</text>
                <text class="graph-label" x="220" y="222">1</text>
                <text class="graph-label" data-goal-label x="10" y="28">1</text>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const EASE = "linear(0, 0.18, 0.42, 0.72, 0.95, 1.06, 1.04, 1.01, 0.99, 1)";

      const DURATION = 1800;
      const GRAPH_SIZE = 192;
      const GRAPH_INSET = 24;
      const GRID_DIVISIONS = 6;

      const grid = document.querySelector("[data-grid]");
      const reference = document.querySelector("[data-reference]");
      const token = document.querySelector("[data-token]");
      const goalLine = document.querySelector("[data-goal]");
      const goalLabel = document.querySelector("[data-goal-label]");
      const curve = document.querySelector("[data-curve]");
      const stopsRoot = document.querySelector("[data-stops]");
      const cursor = document.querySelector("[data-cursor]");
      const replayButton = document.querySelector("[data-replay]");

      let frameId = 0;

      /**
       * @typedef {object} LinearStop
       * @property {number} value
       * @property {number} position
       */

      /**
       * @typedef {object} GraphBounds
       * @property {number} min
       * @property {number} max
       */

      /**
       * @typedef {object} GraphPoint
       * @property {number} x
       * @property {number} y
       */

      /**
       * Clamps a numeric value into the provided range.
       *
       * @param {number} value
       * @param {number} min
       * @param {number} max
       * @returns {number}
       */
      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      /**
       * Parses a CSS linear() timing function into normalized stop objects with explicit positions.
       *
       * @param {string} input
       * @returns {LinearStop[]}
       */
      function parseLinear(input) {
        const match = input.trim().match(/^linear\((.*)\)$/);

        if (!match) {
          throw new Error("Expected a CSS linear() timing function.");
        }

        const expandedStops = match[1]
          .split(",")
          .map((part) => part.trim())
          .filter(Boolean)
          .flatMap((part) => {
            const tokens = part.split(/\s+/).filter(Boolean);
            const value = Number(tokens[0]);
            const positions = tokens.slice(1).map((token) => Number(token.replace("%", "")) / 100);

            if (positions.length === 0) {
              return [{ value, position: null }];
            }

            if (positions.length === 1) {
              return [{ value, position: positions[0] }];
            }

            return positions.slice(0, 2).map((position) => ({ value, position }));
          });

        if (expandedStops.length === 0) {
          throw new Error("linear() needs at least one stop.");
        }

        if (expandedStops[0].position == null) {
          expandedStops[0].position = 0;
        }

        if (expandedStops.at(-1).position == null) {
          expandedStops.at(-1).position = 1;
        }

        let start = 0;

        while (start < expandedStops.length) {
          if (expandedStops[start].position != null) {
            start += 1;
            continue;
          }

          const leftIndex = start - 1;
          let rightIndex = start;

          while (rightIndex < expandedStops.length && expandedStops[rightIndex].position == null) {
            rightIndex += 1;
          }

          const leftPosition = expandedStops[leftIndex].position;
          const rightPosition = expandedStops[rightIndex].position;
          const span = rightIndex - leftIndex;

          for (let offset = 1; offset < span; offset += 1) {
            expandedStops[leftIndex + offset].position =
              leftPosition + ((rightPosition - leftPosition) * offset) / span;
          }

          start = rightIndex + 1;
        }

        return expandedStops.map((stop) => ({
          value: stop.value,
          position: stop.position,
        }));
      }

      /**
       * Samples the parsed linear() stops at a normalized time between 0 and 1.
       *
       * @param {LinearStop[]} points
       * @param {number} time
       * @returns {number}
       */
      function sampleLinear(points, time) {
        const t = clamp(time, 0, 1);

        if (t <= points[0].position) {
          return points[0].value;
        }

        for (let index = 1; index < points.length; index += 1) {
          const previous = points[index - 1];
          const current = points[index];

          if (t <= current.position) {
            if (current.position === previous.position) {
              return current.value;
            }

            const localT = (t - previous.position) / (current.position - previous.position);
            return previous.value + (current.value - previous.value) * localT;
          }
        }

        return points.at(-1).value;
      }

      /**
       * Expands the graph bounds so overshoot and undershoot remain visible.
       *
       * @param {LinearStop[]} points
       * @returns {GraphBounds}
       */
      function getBounds(points) {
        const minValue = Math.min(...points.map((point) => point.value));
        const maxValue = Math.max(...points.map((point) => point.value));
        const topPadding = maxValue > 1 ? Math.max((maxValue - 1) * 0.2, 0.02) : 0;
        return {
          min: minValue < 0 ? minValue : 0,
          max: Math.max(1, maxValue + topPadding),
        };
      }

      /**
       * Converts a normalized time/value pair into SVG coordinates within the chart box.
       *
       * @param {number} time
       * @param {number} value
       * @param {GraphBounds} bounds
       * @returns {GraphPoint}
       */
      function toGraphPoint(time, value, bounds) {
        const x = GRAPH_INSET + GRAPH_SIZE * time;
        const normalized = (value - bounds.min) / (bounds.max - bounds.min);
        const y = GRAPH_INSET + GRAPH_SIZE - GRAPH_SIZE * normalized;
        return { x, y };
      }

      /**
       * Draws the chart grid based on the visible vertical range for the current curve.
       *
       * @param {GraphBounds} bounds
       */
      function drawGrid(bounds) {
        const xStep = GRAPH_SIZE / GRID_DIVISIONS;
        const topY = toGraphPoint(0, 1, bounds).y;
        const bottomY = toGraphPoint(0, 0, bounds).y;
        const yStep = (bottomY - topY) / GRID_DIVISIONS;
        const rightX = GRAPH_INSET + GRAPH_SIZE;
        const lines = [
          `M${GRAPH_INSET} ${topY.toFixed(2)}H${rightX}`,
          `M${rightX} ${(topY - 1).toFixed(2)}V${bottomY.toFixed(2)}`,
        ];

        for (let index = 1; index < GRID_DIVISIONS; index += 1) {
          const x = GRAPH_INSET + xStep * index;
          const y = bottomY - yStep * index;
          lines.push(`M${GRAPH_INSET} ${y.toFixed(2)}H${rightX}`);
          lines.push(`M${x.toFixed(2)} ${(topY - 1).toFixed(2)}V${bottomY.toFixed(2)}`);
        }

        grid.setAttribute("d", lines.join(" "));
      }

      /**
       * Samples the curve densely enough to produce a smooth preview line.
       *
       * @param {LinearStop[]} points
       * @param {GraphBounds} bounds
       */
      function drawCurve(points, bounds) {
        const samples = Array.from({ length: 81 }, (_, index) => {
          const time = index / 80;
          const value = sampleLinear(points, time);
          const point = toGraphPoint(time, value, bounds);
          return `${index === 0 ? "M" : "L"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`;
        });

        curve.setAttribute("d", samples.join(" "));
      }

      /**
       * Renders one marker for each authored stop in the linear() function.
       *
       * @param {LinearStop[]} points
       * @param {GraphBounds} bounds
       */
      function drawStops(points, bounds) {
        stopsRoot.replaceChildren(
          ...points.map((point) => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            const position = toGraphPoint(point.position, point.value, bounds);
            circle.setAttribute("class", "graph-stop");
            circle.setAttribute("cx", position.x.toFixed(2));
            circle.setAttribute("cy", position.y.toFixed(2));
            circle.setAttribute("r", "4");
            return circle;
          }),
        );
      }

      /**
       * Repositions the target label that marks the canonical value of 1.
       *
       * @param {GraphBounds} bounds
       */
      function drawGoal(bounds) {
        const y = toGraphPoint(0, 1, bounds).y.toFixed(2);
        goalLine.setAttribute("d", "");
        goalLabel.setAttribute("y", Number(y) + 4);
      }

      /**
       * Draws the straight 0-to-1 reference line used for comparison.
       *
       * @param {GraphBounds} bounds
       */
      function drawReference(bounds) {
        const start = toGraphPoint(0, 0, bounds);
        const end = toGraphPoint(1, 1, bounds);
        reference.setAttribute("d", `M${start.x} ${start.y}L${end.x} ${end.y}`);
      }

      /**
       * Positions the animated cursor at one sampled time along the parsed curve.
       *
       * @param {LinearStop[]} points
       * @param {GraphBounds} bounds
       * @param {number} time
       */
      function setCursor(points, bounds, time) {
        const value = sampleLinear(points, time);
        const position = toGraphPoint(time, value, bounds);
        cursor.setAttribute("cx", position.x.toFixed(2));
        cursor.setAttribute("cy", position.y.toFixed(2));
      }

      /**
       * Animates the cursor from 0 to 1 using wall-clock time instead of CSS easing.
       *
       * @param {LinearStop[]} points
       * @param {GraphBounds} bounds
       */
      function animateCursor(points, bounds) {
        cancelAnimationFrame(frameId);
        const startTime = performance.now();

        const tick = (now) => {
          const elapsed = now - startTime;
          const progress = clamp(elapsed / DURATION, 0, 1);
          setCursor(points, bounds, progress);

          if (progress < 1) {
            frameId = requestAnimationFrame(tick);
          }
        };

        frameId = requestAnimationFrame(tick);
      }

      const points = parseLinear(EASE);
      const bounds = getBounds(points);

      /** Resets the cursor to the origin and replays the sampling animation. */
      function replay() {
        setCursor(points, bounds, 0);
        animateCursor(points, bounds);
      }

      token.textContent = EASE;
      drawGoal(bounds);
      drawGrid(bounds);
      drawReference(bounds);
      drawCurve(points, bounds);
      drawStops(points, bounds);
      replayButton.addEventListener("click", replay);
      replay();
    </script>
  </body>
</html>
