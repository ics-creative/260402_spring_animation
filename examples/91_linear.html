<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .compare {
        max-width: 860px;
      }

      .demo-title {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        letter-spacing: -0.03em;
      }

      .panel {
        --surface-radius: 18px;

        min-width: 0;
        padding: 18px;

        .token-label {
          margin: 0 0 10px;
          font-size: 0.82rem;
          font-weight: 600;
          letter-spacing: 0.02em;
          text-transform: uppercase;
          color: var(--color-muted);
        }

        .token {
          margin: 0;
          max-width: 100%;
          padding: 14px 16px;
          border-radius: 14px;
          background: var(--color-surface-muted);
          font-family: SFMono-Regular, ui-monospace, monospace;
          font-size: 0.92rem;
          line-height: 1.6;
          overflow-x: auto;
        }
      }

      .graph {
        inline-size: min(100%, 680px);
        aspect-ratio: 1;
        display: block;
        border: 1px solid var(--color-line);
        border-radius: 18px;
        background: var(--color-surface);

        .graph-grid,
        .graph-axis,
        .graph-reference,
        .graph-line {
          fill: none;
          stroke-linecap: round;
          stroke-linejoin: round;
        }

        .graph-grid {
          stroke: var(--color-axis-line);
          stroke-width: 1;
        }

        .graph-axis {
          stroke: var(--color-axis-line);
          stroke-width: 1.2;
        }

        .graph-reference {
          stroke: var(--color-axis-line);
          stroke-width: 1.4;
          stroke-dasharray: 5 6;
        }

        .graph-line {
          stroke: var(--color-accent);
          stroke-width: 3;
        }

        .graph-stop {
          fill: var(--color-surface);
          stroke: var(--color-accent);
          stroke-width: 2;
        }

        .graph-cursor {
          fill: var(--color-text);
          stroke: var(--color-surface);
          stroke-width: 3;
        }

        .graph-label {
          fill: var(--color-muted);
          font-family: sans-serif;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stage">
        <div class="compare demo-compare">
          <button class="button demo-replay" data-replay>
            <span class="replay-icon"></span>
            <span>Replay</span>
          </button>

          <h1 class="demo-title">`linear()`</h1>

          <div class="panel surface-card">
            <p class="token-label">サンプル</p>
            <pre class="token"><code data-token></code></pre>
          </div>

          <div class="panel surface-card demo-graph-panel">
            <!-- 📈 -->
            <svg class="graph" viewBox="0 0 240 240">
              <path class="graph-grid" data-grid></path>
              <path class="graph-axis" d="M24 24V216H216"></path>
              <path class="graph-reference" data-reference></path>
              <path class="graph-line" data-curve></path>
              <g data-stops></g>
              <circle class="graph-cursor" data-cursor cx="24" cy="216" r="5"></circle>
              <text class="graph-label" x="18" y="222">0</text>
              <text class="graph-label" x="220" y="222">1</text>
              <text class="graph-label" data-goal-label x="10" y="28">1</text>
            </svg>
          </div>
        </div>
      </div>
    </main>

    <script>
      const values = [0, 0.18, 0.42, 0.72, 0.95, 1.06, 1.04, 1.01, 0.99, 1];
      const EASE = `linear(${values.join(", ")})`;
      const DURATION = 1800;
      const GRAPH = {
        inset: 24,
        size: 192,
        divisions: 6,
        samples: 80,
      };

      const token = document.querySelector("[data-token]");
      const replayButton = document.querySelector("[data-replay]");
      const graph = {
        grid: document.querySelector("[data-grid]"),
        reference: document.querySelector("[data-reference]"),
        goalLabel: document.querySelector("[data-goal-label]"),
        curve: document.querySelector("[data-curve]"),
        stops: document.querySelector("[data-stops]"),
        cursor: document.querySelector("[data-cursor]"),
      };

      let frameId = 0;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      /** Samples the parsed stops at a normalized time. */
      function sampleLinear(points, time) {
        const t = clamp(time, 0, 1);

        if (t <= points[0].position) {
          return points[0].value;
        }

        for (let index = 1; index < points.length; index += 1) {
          const previous = points[index - 1];
          const current = points[index];

          if (t <= current.position) {
            if (current.position === previous.position) {
              return current.value;
            }

            const localT = (t - previous.position) / (current.position - previous.position);
            return previous.value + (current.value - previous.value) * localT;
          }
        }

        return points.at(-1).value;
      }

      /** Expands the graph bounds so overshoot stays visible. */
      function getBounds(points) {
        const minValue = Math.min(...points.map((point) => point.value));
        const maxValue = Math.max(...points.map((point) => point.value));
        const topPadding = maxValue > 1 ? Math.max((maxValue - 1) * 0.2, 0.02) : 0;
        return {
          min: minValue < 0 ? minValue : 0,
          max: Math.max(1, maxValue + topPadding),
        };
      }

      function format(value) {
        return value.toFixed(2);
      }

      function toGraphPoint(time, value, bounds) {
        const x = GRAPH.inset + GRAPH.size * time;
        const normalized = (value - bounds.min) / (bounds.max - bounds.min);
        const y = GRAPH.inset + GRAPH.size - GRAPH.size * normalized;
        return { x, y };
      }

      function renderGraph(points, bounds) {
        const top = toGraphPoint(0, 1, bounds);
        const bottom = toGraphPoint(0, 0, bounds);
        const right = GRAPH.inset + GRAPH.size;
        const xStep = GRAPH.size / GRAPH.divisions;
        const yStep = (bottom.y - top.y) / GRAPH.divisions;
        const gridLines = Array.from({ length: GRAPH.divisions + 1 }, (_, index) => {
          const x = GRAPH.inset + xStep * index;
          const y = bottom.y - yStep * index;
          const lines = [`M${GRAPH.inset} ${format(y)}H${right}`];

          if (index < GRAPH.divisions) {
            lines.push(`M${format(x)} ${format(top.y - 1)}V${format(bottom.y)}`);
          }

          return lines;
        }).flat();

        graph.grid.setAttribute("d", gridLines.join(" "));
        graph.reference.setAttribute("d", `M${format(bottom.x)} ${format(bottom.y)}L${format(right)} ${format(top.y)}`);
        graph.curve.setAttribute(
          "d",
          Array.from({ length: GRAPH.samples + 1 }, (_, index) => {
            const time = index / GRAPH.samples;
            const point = toGraphPoint(time, sampleLinear(points, time), bounds);
            return `${index === 0 ? "M" : "L"}${format(point.x)} ${format(point.y)}`;
          }).join(" "),
        );
        graph.stops.innerHTML = points
          .map((point) => {
            const position = toGraphPoint(point.position, point.value, bounds);
            return `<circle class="graph-stop" cx="${format(position.x)}" cy="${format(position.y)}" r="4"></circle>`;
          })
          .join("");
        graph.goalLabel.setAttribute("y", String(top.y + 4));
      }

      function setCursor(points, bounds, time) {
        const value = sampleLinear(points, time);
        const position = toGraphPoint(time, value, bounds);
        graph.cursor.setAttribute("cx", format(position.x));
        graph.cursor.setAttribute("cy", format(position.y));
      }

      function animateCursor(points, bounds) {
        cancelAnimationFrame(frameId);
        const startTime = performance.now();

        const tick = (now) => {
          const elapsed = now - startTime;
          const progress = clamp(elapsed / DURATION, 0, 1);
          setCursor(points, bounds, progress);

          if (progress < 1) {
            frameId = requestAnimationFrame(tick);
          }
        };

        frameId = requestAnimationFrame(tick);
      }

      const points = values.map((value, index) => ({
        value,
        position: index / (values.length - 1),
      }));
      const bounds = getBounds(points);

      function replay() {
        setCursor(points, bounds, 0);
        animateCursor(points, bounds);
      }

      token.textContent = EASE;
      renderGraph(points, bounds);
      replayButton.addEventListener("click", replay);
      replay();
    </script>
  </body>
</html>
