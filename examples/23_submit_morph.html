<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .submit {
        position: relative;
        width: 256px;
        height: 64px;
        min-height: 56px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        overflow: clip;
        transition:
          width 1s var(--spring-default),
          border-radius 1s var(--spring-bouncy),
          scale 1s var(--spring-bouncy),
          background-color 0.2s,
          color 0.2s,
          border-color 0.2s;

        &[data-state="idle"]:hover {
          color: var(--accent);
          border-color: var(--accent);
        }

        .submit-label,
        .submit-icon,
        .submit-spinner {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
          transition:
            opacity 0.2s,
            scale 0.5s var(--spring-strong),
            translate 0.5s var(--spring-strong),
            rotate 0.5s var(--spring-strong);
        }

        .submit-label,
        .submit-icon,
        .submit-spinner::before {
          transition:
            opacity 0.2s,
            scale 0.5s var(--spring-strong),
            translate 0.5s var(--spring-strong),
            rotate 0.5s var(--spring-strong);
        }

        .submit-icon,
        .submit-spinner {
          opacity: 0;
          scale: 0.55;
        }

        .submit-icon {
          svg {
            width: 22px;
            height: 22px;
            scale: 0.82;
            stroke: currentcolor;
            stroke-width: 2.75;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            transform-box: fill-box;
            transform-origin: center;
            transition: scale 0.3s var(--spring-default);
          }

          path {
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            transition: stroke-dashoffset 0.4s ease-out 0.1s;
          }
        }

        .submit-spinner {
          &::before {
            content: "";
            width: 22px;
            height: 22px;
            border: 2px solid currentcolor;
            border-right-color: transparent;
            border-radius: 50%;
            rotate: -90deg;
          }
        }

        /* Loading and done share the same circle so the morph reads as one shape, not a jump cut. */
        &[data-state="loading"],
        &[data-state="done"] {
          width: 64px;
          height: 64px;
          border-radius: 32px;
          cursor: default;

          &:hover {
            transform: none;
            color: inherit;
            border-color: inherit;
          }
        }

        &[data-state="loading"] {
          scale: 1;
          translate: 0 0;

          .submit-label {
            opacity: 0;
            scale: 0.45;
            translate: 0 -10px;
          }

          .submit-spinner {
            opacity: 1;
            scale: 1;
          }

          .submit-spinner::before {
            rotate: 0deg;
            scale: 1.06;
            animation: submit-spinner-rotate 0.7s linear infinite;
          }
        }

        &[data-state="done"] {
          background: var(--accent);
          border-color: var(--accent);
          color: var(--accent-contrast);
          scale: 1;
          translate: 0 0;

          .submit-label,
          .submit-spinner {
            opacity: 0;
            scale: 0.42;
            translate: 0 10px;
          }

          .submit-icon {
            opacity: 1;
            scale: 1;
            translate: 0 0;

            svg {
              scale: 1;
            }

            path {
              stroke-dashoffset: 0;
            }
          }
        }

        &:disabled {
          pointer-events: none;
        }
      }

      @keyframes submit-spinner-rotate {
        to {
          rotate: 360deg;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="submit" data-submit data-state="idle">
          <span class="submit-label">Submit</span>
          <span class="submit-spinner"></span>
          <span class="submit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 12.5l4.2 4.2L19 7.4"></path>
            </svg>
          </span>
        </button>
      </section>
    </main>
    <script type="module">
      const button = document.querySelector("[data-submit]");
      const setState = (state) => {
        button.dataset.state = state;
        button.disabled = state !== "idle";
      };

      button.addEventListener("click", () => {
        if (button.dataset.state !== "idle") return;
        setState("loading");
        setTimeout(() => {
          setState("done");
        }, 1050);
        setTimeout(() => {
          setState("idle");
        }, 2200);
      });
    </script>
  </body>
</html>
