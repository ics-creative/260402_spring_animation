name: ページ公開

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: 依存関係のインストール
        run: npm ci

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: ビルド
        run: npm run build

      - name: 生成物のアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: デプロイ
        id: deploy
        uses: actions/deploy-pages@v4
