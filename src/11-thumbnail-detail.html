<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .gallery {
        display: grid;
        gap: 12px;
      }

      .thumbs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .thumb {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--surface);
        cursor: pointer;
        transition:
          scale 0.8s var(--spring-anchor),
          border-color 0.2s;

        &:hover {
          border-color: var(--accent);
        }

        .thumb__image {
          aspect-ratio: 4 / 3;
          border-radius: var(--radius-sm);
          background: var(--tone);
        }

        .thumb__label {
          margin: 0;
        }
      }

      .detail-dialog {
        margin: 0;
        padding: 0;
        border: 0;
        background: none;
        position: fixed;
        inset: auto;
        position-anchor: var(--detail-anchor);
        left: anchor(center);
        top: anchor(center);
        translate: -50% -50%;
        opacity: 0;
        scale: 0.18;
        transition:
          opacity 0.24s,
          scale 1s var(--spring-anchor),
          left 1s var(--spring-anchor),
          top 1s var(--spring-anchor),
          display 0.24s allow-discrete,
          overlay 0.24s allow-discrete;

        &[open] {
          left: 50%;
          top: 50%;
          opacity: 1;
          scale: 1;

          @starting-style {
            left: anchor(center);
            top: anchor(center);
            opacity: 0;
            scale: 0.18;
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 40%);
          opacity: 0;
          transition: opacity 0.24s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }
      }

      .detail-card {
        width: min(720px, calc(100vw - 48px));
        display: grid;
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--surface);

        .detail-card__title,
        .detail-card__copy {
          margin: 0;
        }

        .detail-card__image {
          aspect-ratio: 4 / 3;
          min-height: 360px;
          border-radius: var(--radius-sm);
          background: var(--tone);
        }

        .detail-card__copy {
          color: var(--muted);
        }

        .detail-card__close {
          justify-self: end;
        }
      }

      @media (width <= 640px) {
        .thumbs {
          grid-template-columns: 1fr;
        }

        .detail-card {
          width: min(calc(100vw - 24px), 560px);
        }

        .detail-card__image {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="gallery">
          <div class="thumbs">
            <button
              class="thumb"
              commandfor="detail-1"
              command="show-modal"
              style="--tone: #d8e6ff; anchor-name: --thumb-1"
            >
              <span class="thumb__image"></span>
              <p class="thumb__label">Blue card</p>
            </button>
            <button
              class="thumb"
              commandfor="detail-2"
              command="show-modal"
              style="--tone: #ffe0cc; anchor-name: --thumb-2"
            >
              <span class="thumb__image"></span>
              <p class="thumb__label">Orange card</p>
            </button>
            <button
              class="thumb"
              commandfor="detail-3"
              command="show-modal"
              style="--tone: #d8f0e2; anchor-name: --thumb-3"
            >
              <span class="thumb__image"></span>
              <p class="thumb__label">Green card</p>
            </button>
          </div>
        </div>
      </section>

      <dialog class="detail-dialog" id="detail-1" style="--detail-anchor: --thumb-1">
        <article class="detail-card">
          <button class="button detail-card__close" commandfor="detail-1" command="close">
            Close
          </button>
          <div class="detail-card__image" style="--tone: #d8e6ff"></div>
          <h2 class="detail-card__title">Blue card</h2>
          <p class="detail-card__copy">The detail view opens from the selected thumbnail.</p>
        </article>
      </dialog>
      <dialog class="detail-dialog" id="detail-2" style="--detail-anchor: --thumb-2">
        <article class="detail-card">
          <button class="button detail-card__close" commandfor="detail-2" command="close">
            Close
          </button>
          <div class="detail-card__image" style="--tone: #ffe0cc"></div>
          <h2 class="detail-card__title">Orange card</h2>
          <p class="detail-card__copy">
            Anchor positioning keeps the launch point tied to the clicked card.
          </p>
        </article>
      </dialog>
      <dialog class="detail-dialog" id="detail-3" style="--detail-anchor: --thumb-3">
        <article class="detail-card">
          <button class="button detail-card__close" commandfor="detail-3" command="close">
            Close
          </button>
          <div class="detail-card__image" style="--tone: #d8f0e2"></div>
          <h2 class="detail-card__title">Green card</h2>
          <p class="detail-card__copy">
            The larger detail is hidden until the thumbnail is chosen.
          </p>
        </article>
      </dialog>
    </main>
  </body>
</html>
