<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .sheet {
        inset: auto 0 0;
        width: min(560px, calc(100vw - 24px));
        margin: 0 auto 12px;
        padding: 0;
        border: 0;
        background: none;
        opacity: 0;
        translate: 0 100%;
        transition:
          opacity 0.24s,
          translate 0.9s var(--spring-anchor),
          display 0.24s allow-discrete,
          overlay 0.24s allow-discrete;

        &[open] {
          opacity: 1;
          translate: 0 0;

          @starting-style {
            opacity: 0;
            translate: 0 100%;
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 32%);
          opacity: 0;
          transition: opacity 0.24s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }
      }

      .sheet {
        .sheet__panel {
          display: grid;
          gap: 10px;
          padding: 16px;
          border: 1px solid var(--line);
          border-radius: var(--radius-lg);
          background: var(--surface);
        }

        .sheet__top {
          display: flex;
          justify-content: flex-end;
        }

        .sheet__close {
          position: relative;
          width: 40px;
          min-height: 40px;
          padding: 0;
          border-radius: 20px;

          &::before,
          &::after {
            content: '';
            position: absolute;
            top: calc(50% - 1px);
            left: 10px;
            width: 18px;
            height: 2px;
            background: currentColor;
          }

          &::before {
            rotate: 45deg;
          }

          &::after {
            rotate: -45deg;
          }
        }

        .sheet__handle {
          width: 48px;
          height: 4px;
          margin-inline: auto;
          border-radius: 2px;
          background: var(--line);
        }

        .sheet__action {
          justify-content: flex-start;
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button" commandfor="bottom-sheet" command="show-modal">Open Sheet</button>
      </section>
      <dialog class="sheet" id="bottom-sheet">
        <div class="sheet__panel">
          <div class="sheet__top">
            <button class="button sheet__close" commandfor="bottom-sheet" command="close"></button>
          </div>
          <span class="sheet__handle"></span>
          <button class="button sheet__action">Rename</button>
          <button class="button sheet__action">Duplicate</button>
          <button class="button sheet__action">Move to Archive</button>
        </div>
      </dialog>
    </main>
  </body>
</html>
