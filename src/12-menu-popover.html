<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .menu {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .menu-button {
        min-width: 124px;
      }

      .submenu {
        margin: 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--surface);
        box-shadow: 0 10px 24px rgb(0 0 0 / 8%);
        position-anchor: var(--submenu-anchor);
        position-area: bottom span-right;
        margin-block-start: 10px;
        position-try-fallbacks:
          flip-block,
          flip-inline,
          flip-block flip-inline;
        opacity: 0;
        scale: 0.84;
        transform-origin: top left;
        transition:
          opacity 0.24s,
          scale 0.8s var(--spring-anchor),
          inset 0.8s var(--spring-anchor),
          display 0.24s allow-discrete,
          overlay 0.24s allow-discrete;

        &:popover-open {
          opacity: 1;
          scale: 1;

          @starting-style {
            opacity: 0;
            scale: 0.84;
          }
        }
      }

      .submenu-list {
        display: grid;
        gap: 6px;
        min-width: 180px;
      }

      .submenu-item {
        justify-content: flex-start;
        min-height: 40px;
        padding-inline: 12px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="menu">
          <button
            class="button menu-button"
            commandfor="submenu-share"
            command="toggle-popover"
            style="anchor-name: --menu-share"
          >
            Share
          </button>
          <button
            class="button menu-button"
            commandfor="submenu-export"
            command="toggle-popover"
            style="anchor-name: --menu-export"
          >
            Export
          </button>
          <button
            class="button menu-button"
            commandfor="submenu-move"
            command="toggle-popover"
            style="anchor-name: --menu-move"
          >
            Move
          </button>
        </div>
      </section>

      <div class="submenu" id="submenu-share" popover style="--submenu-anchor: --menu-share">
        <div class="submenu-list">
          <button class="button submenu-item">Copy link</button>
          <button class="button submenu-item">Invite editor</button>
          <button class="button submenu-item">Publish preview</button>
        </div>
      </div>

      <div class="submenu" id="submenu-export" popover style="--submenu-anchor: --menu-export">
        <div class="submenu-list">
          <button class="button submenu-item">Export PNG</button>
          <button class="button submenu-item">Export PDF</button>
          <button class="button submenu-item">Export HTML</button>
        </div>
      </div>

      <div class="submenu" id="submenu-move" popover style="--submenu-anchor: --menu-move">
        <div class="submenu-list">
          <button class="button submenu-item">Move to Drafts</button>
          <button class="button submenu-item">Move to Review</button>
          <button class="button submenu-item">Move to Archive</button>
        </div>
      </div>
    </main>
  </body>
</html>
