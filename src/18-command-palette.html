<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .palette {
        inset: 72px 0 auto;
        width: min(640px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 0;
        border: 0;
        background: none;
        opacity: 0;
        translate: 0 -40px;
        scale: 0.92;
        transition:
          opacity 0.24s,
          translate 0.9s var(--spring-anchor),
          scale 0.9s var(--spring-anchor),
          display 0.24s allow-discrete,
          overlay 0.24s allow-discrete;

        &[open] {
          opacity: 1;
          translate: 0 0;
          scale: 1;

          @starting-style {
            opacity: 0;
            translate: 0 -40px;
            scale: 0.92;
          }
        }

        &::backdrop {
          background: rgb(0 0 0 / 20%);
          opacity: 0;
          transition: opacity 0.24s;
        }

        &[open]::backdrop {
          opacity: 1;

          @starting-style {
            opacity: 0;
          }
        }
      }

      .palette__panel {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: 0 20px 40px rgb(0 0 0 / 10%);

        .palette__top {
          display: flex;
          justify-content: flex-end;
        }

        .palette__close {
          position: relative;
          width: 40px;
          min-height: 40px;
          padding: 0;
          border-radius: 20px;

          &::before,
          &::after {
            content: '';
            position: absolute;
            top: calc(50% - 1px);
            left: 10px;
            width: 18px;
            height: 2px;
            background: currentColor;
          }

          &::before {
            rotate: 45deg;
          }

          &::after {
            rotate: -45deg;
          }
        }

        .palette__search {
          min-height: 52px;
          padding-inline: 14px;
          border: 1px solid var(--line);
          border-radius: var(--radius-md);
          outline: 0;
        }

        .palette__list {
          display: grid;
          gap: 6px;
        }

        .palette__item {
          justify-content: flex-start;
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button" commandfor="command-palette" command="show-modal">
          Open Commands
        </button>
      </section>
      <dialog class="palette" id="command-palette">
        <div class="palette__panel">
          <div class="palette__top">
            <button
              class="button palette__close"
              commandfor="command-palette"
              command="close"
            ></button>
          </div>
          <input class="palette__search" type="search" placeholder="Jump to action" />
          <div class="palette__list">
            <button class="button palette__item">Create page</button>
            <button class="button palette__item">Open recent file</button>
            <button class="button palette__item">Invite reviewer</button>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
