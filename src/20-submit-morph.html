<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .submit {
        position: relative;
        width: 160px;
        height: 56px;
        min-height: 56px;
        padding: 0;
        overflow: clip;
        transition:
          width 0.9s var(--spring-anchor),
          border-radius 0.9s var(--spring-anchor),
          background-color 0.2s,
          color 0.2s;

        .submit__label,
        .submit__icon,
        .submit__spinner {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
        }

        .submit__label,
        .submit__icon,
        .submit__spinner::before {
          transition:
            opacity 0.24s,
            scale 0.8s var(--spring-anchor);
        }

        .submit__icon,
        .submit__spinner {
          opacity: 0;
          scale: 0.7;
        }

        .submit__spinner::before {
          content: '';
          width: 22px;
          height: 22px;
          border: 2px solid currentColor;
          border-right-color: transparent;
          border-radius: 50%;
          animation: spin 0.7s linear infinite;
        }
      }

      .submit[data-state='loading'],
      .submit[data-state='done'] {
        width: 56px;
        border-radius: 28px;
      }

      .submit[data-state='done'] {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-contrast);
      }

      .submit[data-state='loading'] .submit__label {
        opacity: 0;
        scale: 0.7;
      }

      .submit[data-state='loading'] .submit__spinner {
        opacity: 1;
        scale: 1;
      }

      .submit[data-state='done'] .submit__label,
      .submit[data-state='done'] .submit__spinner {
        opacity: 0;
        scale: 0.7;
      }

      .submit[data-state='done'] .submit__icon {
        opacity: 1;
        scale: 1;
      }

      @keyframes spin {
        to {
          rotate: 360deg;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <button class="button submit" data-submit data-state="idle">
          <span class="submit__label">Submit</span>
          <span class="submit__spinner"></span>
          <span class="submit__icon">OK</span>
        </button>
      </section>
    </main>
    <script type="module">
      const button = document.querySelector('[data-submit]')

      button.addEventListener('click', () => {
        if (button.dataset.state !== 'idle') return
        button.dataset.state = 'loading'
        setTimeout(() => {
          button.dataset.state = 'done'
        }, 1200)
        setTimeout(() => {
          button.dataset.state = 'idle'
        }, 2500)
      })
    </script>
  </body>
</html>
