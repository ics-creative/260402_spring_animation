<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        min-height: 220vh;
        padding: 0;
        align-content: start;
      }

      .frame {
        position: sticky;
        top: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding-inline: 24px;
      }

      .headline {
        margin: 0;
        display: grid;
        justify-items: center;
        gap: 0.04em;
        font-size: clamp(3rem, 11vw, 8rem);
        line-height: 0.88;
        letter-spacing: -0.08em;
        text-wrap: balance;
      }

      .line {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.04em;
      }

      .letter {
        --offset: calc((sibling-index() - 1) * 4%);
        display: inline-block;
        opacity: 0;
        translate: 0 1.6em;
        scale: 0.58;
        filter: blur(18px);
        will-change: transform, opacity, filter;
        animation-name: letter-in;
        animation-duration: 1s;
        animation-fill-mode: both;
        animation-timing-function: linear;
        animation-timeline: view(block);
        animation-range-start: entry var(--offset);
        animation-range-end: entry calc(var(--offset) + 16%);
      }

      @keyframes letter-in {
        0% {
          opacity: 0;
          translate: 0 1.6em;
          scale: 0.58;
          filter: blur(18px);
        }

        72% {
          opacity: 1;
          translate: 0 -0.12em;
          scale: 1.1;
          filter: blur(0);
        }

        100% {
          opacity: 1;
          translate: 0;
          scale: 1;
          filter: blur(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="frame">
          <p class="headline">
            <span class="line">
              <span class="letter">S</span>
              <span class="letter">P</span>
              <span class="letter">R</span>
              <span class="letter">I</span>
              <span class="letter">N</span>
              <span class="letter">G</span>
            </span>
            <span class="line">
              <span class="letter">T</span>
              <span class="letter">Y</span>
              <span class="letter">P</span>
              <span class="letter">E</span>
            </span>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
