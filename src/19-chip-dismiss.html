<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding-inline: 14px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--surface);

        button {
          position: relative;
          width: 24px;
          height: 24px;
          padding: 0;
          border: 1px solid var(--line);
          border-radius: 12px;
          cursor: pointer;

          &::before,
          &::after {
            content: '';
            position: absolute;
            top: calc(50% - 1px);
            left: 5px;
            width: 12px;
            height: 2px;
            background: currentColor;
          }

          &::before {
            rotate: 45deg;
          }

          &::after {
            rotate: -45deg;
          }
        }
      }

      .chip.is-leaving {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="chip-row" data-row>
          <div class="chip"><span>Motion</span><button></button></div>
          <div class="chip"><span>Popover</span><button></button></div>
          <div class="chip"><span>Dialog</span><button></button></div>
          <div class="chip"><span>Anchor</span><button></button></div>
          <div class="chip"><span>Spring</span><button></button></div>
        </div>
      </section>
    </main>
    <script type="module">
      const row = document.querySelector('[data-row]')

      const easing =
        'linear(0, 0.1116, 0.216, 0.313, 0.4026, 0.485, 0.5602, 0.6286, 0.6904, 0.746, 0.7955, 0.8396, 0.8783, 0.9123, 0.9418, 0.9672, 0.9888, 1.0071, 1.0222, 1.0346, 1.0446, 1.0524, 1.0582, 1.0624, 1.0651, 1.0666, 1.067, 1.0665, 1.0653, 1.0635, 1.0611, 1.0584, 1.0555, 1.0523, 1.049, 1.0456, 1.0422, 1.0389, 1.0356, 1.0324, 1.0293, 1.0264, 1.0236, 1.021, 1.0186, 1.0163, 1.0142, 1.0122, 1.0105, 1.0089, 1.0074, 1.0061, 1.0049, 1.0039, 1.003, 1.0022, 1.0015, 1.0009, 1.0003, 0.9999, 0.9995, 0.9992, 0.999, 0.9988, 0.9987, 0.9986, 0.9985, 0.9984, 0.9985, 0.9985, 0.9985, 0.9986, 0.9986, 0.9987, 0.9988, 0.9989, 0.9989, 0.999, 0.9991, 0.9992, 0.9992, 0.9993, 0.9994, 0.9994, 0.9995, 0.9996, 0.9996, 0.9997, 0.9997, 0.9998, 0.9998, 0.9998, 0.9999, 0.9999, 0.9999, 0.9999, 0.9999, 1, 1, 1)'

      const animateShift = (before) => {
        for (const chip of row.children) {
          const previous = before.get(chip)
          if (!previous) continue
          const next = chip.getBoundingClientRect()
          const deltaX = previous.left - next.left
          const deltaY = previous.top - next.top
          if (deltaX === 0 && deltaY === 0) continue
          chip.animate([{ translate: `${deltaX}px ${deltaY}px` }, { translate: '0 0' }], {
            duration: 800,
            easing,
          })
        }
      }

      row.addEventListener('click', (event) => {
        const button = event.target.closest('button')
        if (!button) return
        const chip = button.closest('.chip')
        const before = new Map(
          [...row.children].map((item) => [item, item.getBoundingClientRect()]),
        )
        chip.classList.add('is-leaving')
        chip
          .animate(
            [
              { opacity: 1, scale: 1 },
              { opacity: 0, scale: 0.7 },
            ],
            {
              duration: 420,
              easing,
              fill: 'forwards',
            },
          )
          .addEventListener(
            'finish',
            () => {
              chip.remove()
              animateShift(before)
            },
            { once: true },
          )
      })
    </script>
  </body>
</html>
