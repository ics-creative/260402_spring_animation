<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        align-content: center;
        justify-items: center;
      }

      .search {
        width: 56px;
        min-height: 56px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: clip;
        transition:
          width 0.82s var(--spring-anchor),
          border-color 0.2s,
          box-shadow 0.82s var(--spring-soft);
      }

      .search__icon {
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 20px;
        display: grid;
        place-items: center;
        translate: 0 0;
        transition:
          scale 0.82s var(--spring-anchor),
          translate 0.82s var(--spring-anchor);
      }

      .search__input {
        flex: 1;
        max-width: 0;
        min-width: 0;
        padding: 0;
        border: 0;
        outline: 0;
        background: transparent;
        opacity: 0;
        pointer-events: none;
        transition:
          max-width 0.7s var(--spring-anchor),
          padding-inline 0.7s var(--spring-anchor),
          opacity 0.14s;
      }

      .search[data-state='open'] {
        width: min(420px, calc(100vw - 32px));
        justify-content: flex-start;
        border-color: var(--accent);
        box-shadow: 0 16px 32px rgb(50 35 179 / 10%);
      }

      .search[data-state='open'] .search__icon {
        scale: 1.06;
        translate: 1px 0;
      }

      .search[data-state='open'] .search__input {
        max-width: 320px;
        opacity: 1;
        padding-inline: var(--space-12) var(--space-16);
        pointer-events: auto;
        transition-delay: 0.1s;
      }

      .search[data-state='closing'] {
        transition:
          width 0.28s cubic-bezier(0.28, 0, 0.2, 1) 0.08s,
          border-color 0.18s,
          box-shadow 0.18s;
      }

      .search[data-state='closing'] .search__input {
        max-width: 0;
        opacity: 0;
        padding-inline: 0;
        pointer-events: none;
        transition:
          max-width 0.16s ease,
          padding-inline 0.16s ease,
          opacity 0.1s;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <label class="search">
          <span class="search__icon">Q</span>
          <input class="search__input" type="search" placeholder="Search projects" />
        </label>
      </section>
    </main>
    <script type="module">
      const search = document.querySelector('.search')
      const input = search.querySelector('.search__input')
      let closeTimer = 0

      search.addEventListener('focusin', () => {
        clearTimeout(closeTimer)
        search.dataset.state = 'open'
      })

      search.addEventListener('focusout', (event) => {
        if (search.contains(event.relatedTarget)) return
        search.dataset.state = 'closing'
        closeTimer = window.setTimeout(() => {
          if (search.matches(':focus-within')) return
          delete search.dataset.state
        }, 360)
      })
    </script>
  </body>
</html>
