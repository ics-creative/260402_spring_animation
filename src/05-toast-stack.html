<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <style>
      .stage {
        position: relative;
        min-height: 420px;
        justify-items: center;
        align-content: end;
      }

      .stack {
        position: absolute;
        top: 24px;
        left: 50%;
        width: min(360px, calc(100% - 32px));
        display: grid;
        gap: 12px;
        translate: -50% 0;
      }

      .toast {
        width: 100%;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--surface);
        opacity: 1;
        translate: 0 0;
        scale: 1;
        transition:
          opacity 0.3s,
          translate 0.8s var(--spring-anchor),
          scale 0.8s var(--spring-anchor);

        @starting-style {
          opacity: 0;
          translate: 0 -16px;
          scale: 0.92;
        }

        strong,
        p {
          margin: 0;
        }

        p {
          margin-top: 8px;
          color: var(--muted);
        }
      }

      .toast.leave {
        opacity: 0;
        translate: 0 -18px;
        scale: 0.94;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="stack" data-stack></div>
        <div class="row controls">
          <button class="button" data-add>Add toast</button>
        </div>
      </section>
    </main>
    <script type="module">
      let count = 0
      const stack = document.querySelector('[data-stack]')
      const easing =
        'linear(0, 0.1116, 0.216, 0.313, 0.4026, 0.485, 0.5602, 0.6286, 0.6904, 0.746, 0.7955, 0.8396, 0.8783, 0.9123, 0.9418, 0.9672, 0.9888, 1.0071, 1.0222, 1.0346, 1.0446, 1.0524, 1.0582, 1.0624, 1.0651, 1.0666, 1.067, 1.0665, 1.0653, 1.0635, 1.0611, 1.0584, 1.0555, 1.0523, 1.049, 1.0456, 1.0422, 1.0389, 1.0356, 1.0324, 1.0293, 1.0264, 1.0236, 1.021, 1.0186, 1.0163, 1.0142, 1.0122, 1.0105, 1.0089, 1.0074, 1.0061, 1.0049, 1.0039, 1.003, 1.0022, 1.0015, 1.0009, 1.0003, 0.9999, 0.9995, 0.9992, 0.999, 0.9988, 0.9987, 0.9986, 0.9985, 0.9984, 0.9985, 0.9985, 0.9985, 0.9986, 0.9986, 0.9987, 0.9988, 0.9989, 0.9989, 0.999, 0.9991, 0.9992, 0.9992, 0.9993, 0.9994, 0.9994, 0.9995, 0.9996, 0.9996, 0.9997, 0.9997, 0.9998, 0.9998, 0.9998, 0.9999, 0.9999, 0.9999, 0.9999, 0.9999, 1, 1, 1)'

      const animateStackShift = (before) => {
        for (const toast of stack.children) {
          const previous = before.get(toast)
          if (!previous) continue
          const next = toast.getBoundingClientRect()
          const deltaY = previous.top - next.top
          if (deltaY === 0) continue
          toast.animate([{ translate: `0 ${deltaY}px` }, { translate: '0 0' }], {
            duration: 800,
            easing,
          })
        }
      }

      document.querySelector('[data-add]').addEventListener('click', () => {
        const before = new Map(
          [...stack.children].map((toast) => [toast, toast.getBoundingClientRect()]),
        )
        count += 1
        const toast = document.createElement('article')
        toast.className = 'toast'
        toast.innerHTML = `
          <strong>Toast #${count}</strong>
          <p>Queued preview finished.</p>
        `
        stack.prepend(toast)
        animateStackShift(before)
        setTimeout(() => {
          const beforeRemoval = new Map(
            [...stack.children]
              .filter((item) => item !== toast)
              .map((item) => [item, item.getBoundingClientRect()]),
          )
          toast.classList.add('leave')
          toast.addEventListener(
            'transitionend',
            () => {
              toast.remove()
              animateStackShift(beforeRemoval)
            },
            { once: true },
          )
        }, 2200)
      })
    </script>
  </body>
</html>
